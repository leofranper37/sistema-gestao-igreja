<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Cadastro de Grupo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap {
            padding: 24px 30px 30px;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            max-width: 720px;
        }

        .form-head {
            padding: 12px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .form-body {
            padding: 16px;
            display: grid;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .field input,
        .field textarea {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .field textarea {
            min-height: 90px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
        }

        .btn-ghost {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px 14px;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
        }

        .status {
            font-size: 12px;
            font-weight: 600;
            color: #047857;
        }

        .status.error {
            color: #b91c1c;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Cadastro de Grupo" data-shell-breadcrumb="LDFP / Secretaria / Grupos / Cadastro" data-shell-active="grupo_novo.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="form-card">
                <div class="form-head">Cadastro</div>
                <form id="groupForm" class="form-body">
                    <div class="field">
                        <label for="nomeGrupo">Nome</label>
                        <input type="text" id="nomeGrupo" placeholder="Nome do grupo" required>
                    </div>
                    <div class="field">
                        <label for="liderGrupo">Líder</label>
                        <input type="text" id="liderGrupo" placeholder="Nome do líder">
                    </div>
                    <div class="field">
                        <label for="descricaoGrupo">Descrição</label>
                        <textarea id="descricaoGrupo" placeholder="Descreva o propósito do grupo"></textarea>
                    </div>
                    <div class="actions">
                        <button class="btn-primary" type="submit">Salvar</button>
                        <button class="btn-ghost" type="button" id="btnVoltar">Voltar</button>
                        <span class="status" id="statusMsg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const form = document.getElementById('groupForm');
        const statusMsg = document.getElementById('statusMsg');

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'grupos.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const nome = document.getElementById('nomeGrupo').value.trim();
            const lider = document.getElementById('liderGrupo').value.trim();
            const descricao = document.getElementById('descricaoGrupo').value.trim();

            if (!nome) {
                statusMsg.textContent = 'Informe o nome do grupo.';
                statusMsg.classList.add('error');
                return;
            }

            const lista = JSON.parse(localStorage.getItem('ldfpGroups') || '[]');
            lista.push({
                nome,
                lider: lider || '-',
                descricao,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('ldfpGroups', JSON.stringify(lista));

            statusMsg.textContent = 'Grupo salvo com sucesso!';
            statusMsg.classList.remove('error');
            form.reset();
        });
    </script>
</body>
</html>
