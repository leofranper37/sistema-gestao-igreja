<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Tipos de Receitas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --azul-700: #1d4ed8;
            --azul-600: #2563eb;
            --azul-100: #dbeafe;
            --verde-700: #15803d;
            --verde-600: #16a34a;
            --verde-100: #dcfce7;
            --texto: #334155;
            --borda: #dbe3ef;
        }

        .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 14px 30px; }

        .top-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
        .kpi { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; box-shadow: 0 6px 18px rgba(15, 23, 42, .08); }
        .kpi small { display: block; color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .kpi strong { font-size: 1.5rem; color: #0f172a; }
        .kpi.total strong { color: var(--azul-700); }
        .kpi.ativo strong { color: var(--verde-700); }
        .kpi.plano strong { color: var(--azul-600); }

        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; box-shadow: 0 6px 18px rgba(15, 23, 42, .08); padding: 18px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .card h2 { margin: 0; color: var(--azul-700); font-size: 18px; }
        .card p { margin: 0; color: #475569; }

        .btn { border: 0; border-radius: 8px; padding: 9px 13px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; }
        .btn-primary { background: var(--azul-600); }
        .btn-success { background: var(--verde-700); }
        .btn-light { background: #e2e8f0; color: #0f172a; }
        .btn-danger { background: #dc2626; }

        .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 12px; }
        .toolbar input {
            width: 100%;
            border: 1px solid var(--borda);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eef2f7; padding: 10px 8px; text-align: left; }
        th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; }
        tbody tr { cursor: pointer; }
        tbody tr:hover { background: #f0f9ff; }
        tbody tr.active { background: #ecfeff; }

        .badge {
            display: inline-block;
            border-radius: 99px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-base { background: var(--azul-100); color: var(--azul-700); }
        .badge-custom { background: var(--verde-100); color: var(--verde-700); }

        .detail {
            margin-top: 14px;
            border: 1px solid var(--borda);
            border-radius: 10px;
            padding: 12px;
            background: #f8fafc;
        }
        .detail h3 { margin: 0 0 8px; color: var(--texto); font-size: 14px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 12px; }
        .detail-grid .row { background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 8px; }
        .detail-grid strong { color: #0f172a; }

        .actions { display: flex; gap: 8px; margin-top: 10px; }

        .msg { min-height: 18px; margin-top: 10px; font-size: 12px; }
        .msg.ok { color: var(--verde-700); }
        .msg.error { color: #b91c1c; }

        @media (max-width: 900px) {
            .top-cards { grid-template-columns: 1fr; }
            .toolbar { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Tipos de Receita" data-shell-breadcrumb="LDFP / Tesouraria / Dízimos / Tipos de Receita" data-shell-active="tipos_receitas.html" data-shell-chip="Tesouraria ativa">
<main class="main-content enterprise-main">
    <div class="wrap">
        <div class="top-cards">
            <div class="kpi total"><small>Tipos Cadastrados</small><strong id="kpiTotal">0</strong></div>
            <div class="kpi ativo"><small>Tipos Base</small><strong id="kpiBase">0</strong></div>
            <div class="kpi plano"><small>Tipos Personalizados</small><strong id="kpiCustom">0</strong></div>
        </div>

        <section class="card">
            <div class="card-header">
                <h2><i class="fa-solid fa-tags"></i> Tipos de Receita</h2>
                <button id="btnNovo" class="btn btn-primary" type="button"><i class="fa-solid fa-plus"></i> Novo Tipo</button>
            </div>
            <p>Gerencie os tipos usados nos lançamentos de dízimos e ofertas.</p>

            <div class="toolbar">
                <input type="text" id="filtro" placeholder="Buscar por descrição ou plano de conta...">
                <button id="btnLimpar" class="btn btn-light" type="button">Limpar Filtro</button>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Plano de Conta</th>
                        <th>Origem</th>
                    </tr>
                    </thead>
                    <tbody id="tbTipos"></tbody>
                </table>
            </div>

            <div class="detail" id="detailBox" style="display:none;">
                <h3><i class="fa-solid fa-circle-info"></i> Detalhes do Tipo</h3>
                <div class="detail-grid" id="detailGrid"></div>
                <div class="actions">
                    <button id="btnEditar" type="button" class="btn btn-success">Editar</button>
                    <button id="btnExcluir" type="button" class="btn btn-danger">Excluir</button>
                </div>
            </div>

            <p class="msg" id="msg"></p>
        </section>
    </div>
</main>

<script src="session.js"></script>
<script src="enterprise-shell.js"></script>
<script>
    requireAuthSession();

    const tbTipos = document.getElementById('tbTipos');
    const filtro = document.getElementById('filtro');
    const msg = document.getElementById('msg');
    const detailBox = document.getElementById('detailBox');
    const detailGrid = document.getElementById('detailGrid');
    let allItems = [];
    let selectedId = null;

    function setMsg(text, isError) {
        msg.className = isError ? 'msg error' : 'msg ok';
        msg.textContent = text || '';
    }

    function renderKpis(items) {
        const baseCount = items.filter(i => i.origem === 'base').length;
        const customCount = items.filter(i => i.origem === 'custom').length;
        document.getElementById('kpiTotal').textContent = String(items.length);
        document.getElementById('kpiBase').textContent = String(baseCount);
        document.getElementById('kpiCustom').textContent = String(customCount);
    }

    function renderDetalhe(item) {
        if (!item) {
            detailBox.style.display = 'none';
            return;
        }

        detailGrid.innerHTML = `
            <div class="row"><div>Descrição</div><strong>${item.descricao}</strong></div>
            <div class="row"><div>Plano de Conta</div><strong>${item.planoConta}</strong></div>
            <div class="row"><div>Origem</div><strong>${item.origem === 'base' ? 'Padrão do Sistema' : 'Personalizado'}</strong></div>
            <div class="row"><div>Chave</div><strong>${item.id}</strong></div>
        `;

        detailBox.style.display = 'block';
        document.getElementById('btnExcluir').disabled = item.origem === 'base';
        document.getElementById('btnEditar').disabled = item.origem === 'base';
    }

    function render() {
        const termo = filtro.value.trim().toLowerCase();
        const items = allItems.filter(item => {
            if (!termo) return true;
            return item.descricao.toLowerCase().includes(termo) || item.planoConta.toLowerCase().includes(termo);
        });

        renderKpis(allItems);

        if (!items.length) {
            tbTipos.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#64748b;padding:20px;">Nenhum tipo encontrado.</td></tr>';
            renderDetalhe(null);
            return;
        }

        tbTipos.innerHTML = items.map(item => `
            <tr data-id="${item.id}" class="${selectedId === item.id ? 'active' : ''}">
                <td>${item.descricao}</td>
                <td>${item.planoConta}</td>
                <td><span class="badge ${item.origem === 'base' ? 'badge-base' : 'badge-custom'}">${item.origem === 'base' ? 'Sistema' : 'Personalizado'}</span></td>
            </tr>
        `).join('');

        const selected = allItems.find(i => i.id === selectedId) || items[0];
        selectedId = selected ? selected.id : null;
        renderDetalhe(selected || null);

        tbTipos.querySelectorAll('tr[data-id]').forEach(tr => {
            tr.addEventListener('click', () => {
                selectedId = tr.getAttribute('data-id');
                render();
            });
        });
    }

    async function loadTipos() {
        const response = await fetch('/tipos-receita');
        const data = await response.json().catch(() => ({ items: [] }));

        if (!response.ok) {
            throw new Error(data.error || 'Não foi possível carregar tipos de receita.');
        }

        allItems = data.items || [];
        render();
    }

    document.getElementById('btnNovo').addEventListener('click', async () => {
        const descricao = prompt('Descrição do novo tipo de receita:');
        if (!descricao) return;
        const planoConta = prompt('Plano de conta (ex: 4.01.01.03 - Exemplo):');
        if (!planoConta) return;

        const response = await fetch('/tipos-receita', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ descricao: descricao.trim(), planoConta: planoConta.trim() })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            setMsg(data.error || 'Erro ao criar tipo de receita.', true);
            return;
        }

        selectedId = data.id || null;
        setMsg('Tipo de receita criado com sucesso.', false);
        await loadTipos();
    });

    document.getElementById('btnEditar').addEventListener('click', async () => {
        const current = allItems.find(i => i.id === selectedId);
        if (!current || current.origem === 'base') {
            setMsg('Tipos padrão não podem ser editados nesta tela.', true);
            return;
        }

        const descricao = prompt('Nova descrição:', current.descricao);
        if (!descricao) return;
        const planoConta = prompt('Novo plano de conta:', current.planoConta);
        if (!planoConta) return;

        const response = await fetch(`/tipos-receita/${encodeURIComponent(current.id)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ descricao: descricao.trim(), planoConta: planoConta.trim() })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            setMsg(data.error || 'Erro ao atualizar tipo de receita.', true);
            return;
        }

        setMsg('Tipo de receita atualizado.', false);
        await loadTipos();
    });

    document.getElementById('btnExcluir').addEventListener('click', async () => {
        const current = allItems.find(i => i.id === selectedId);
        if (!current || current.origem === 'base') {
            setMsg('Tipos padrão não podem ser removidos.', true);
            return;
        }

        if (!confirm(`Excluir o tipo "${current.descricao}"?`)) return;

        const response = await fetch(`/tipos-receita/${encodeURIComponent(current.id)}`, { method: 'DELETE' });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            setMsg(data.error || 'Erro ao remover tipo de receita.', true);
            return;
        }

        selectedId = null;
        setMsg('Tipo de receita removido.', false);
        await loadTipos();
    });

    filtro.addEventListener('input', render);
    document.getElementById('btnLimpar').addEventListener('click', () => {
        filtro.value = '';
        render();
    });

    loadTipos().catch(error => {
        setMsg(error.message || 'Erro ao carregar tipos de receita.', true);
    });
</script>
</body>
</html>
