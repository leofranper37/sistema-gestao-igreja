<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Grupos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap {
            padding: 24px 30px 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 9px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #dbe3ef;
            padding: 8px 12px;
            border-radius: 8px;
            min-width: 260px;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .table-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eef2f7;
            font-size: 13px;
            color: #334155;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Grupos" data-shell-breadcrumb="LDFP / Secretaria / Grupos" data-shell-active="grupos.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="page-header">
                <button class="btn-primary" type="button" id="btnNovoGrupo"><i class="fa-solid fa-plus"></i> Novo Grupo</button>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar...">
                </div>
            </div>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Nome do Grupo</th>
                            <th>Líder</th>
                        </tr>
                    </thead>
                    <tbody id="groupsBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        document.getElementById('btnNovoGrupo').addEventListener('click', () => {
            window.location.href = 'grupo_novo.html';
        });

        const searchInput = document.getElementById('searchInput');
        const groupsBody = document.getElementById('groupsBody');

        const loadGroups = () => {
            const saved = JSON.parse(localStorage.getItem('ldfpGroups') || '[]');
            if (!saved.length) {
                groupsBody.innerHTML = '<tr><td colspan="2" class="muted">Nenhum resultado foi encontrado.</td></tr>';
                return [];
            }

            groupsBody.innerHTML = saved.map((item) => `
                <tr>
                    <td>${item.nome || '-'}</td>
                    <td>${item.lider || '-'}</td>
                </tr>
            `).join('');

            return Array.from(groupsBody.querySelectorAll('tr'));
        };

        let rows = loadGroups();

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim().toLowerCase();
            rows.forEach((row) => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });

        window.addEventListener('storage', () => {
            rows = loadGroups();
        });
    </script>
</body>
</html>
