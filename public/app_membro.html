<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f766e">
    <title>App do Membro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .app-shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 20px 14px 28px;
        }

        .hero {
            background: linear-gradient(135deg, #115e59, #0f766e 60%, #0891b2);
            color: #ecfeff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.2);
            margin-bottom: 16px;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .hero p {
            margin: 8px 0 0;
            font-size: 0.92rem;
            color: #ccfbf1;
        }

        .chips {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .stat {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        .stat small {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
        }

        .stat strong {
            display: block;
            margin-top: 6px;
            font-size: 1.4rem;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .action {
            border-radius: 10px;
            padding: 11px;
            border: 1px solid #cbd5e1;
            background: #fff;
            text-decoration: none;
            color: #0f172a;
            font-weight: 700;
            text-align: center;
            font-size: 13px;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .panel {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
        }

        .panel h2 {
            margin: 0 0 8px;
            font-size: 14px;
            color: #155e75;
        }

        .item {
            border-top: 1px solid #f1f5f9;
            padding: 8px 0;
            font-size: 13px;
        }

        .item:first-child {
            border-top: 0;
        }

        .muted {
            color: #94a3b8;
            font-size: 12px;
        }

        @media (max-width: 900px) {
            .stats,
            .quick-actions {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .panels {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 540px) {
            .stats,
            .quick-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <section class="hero">
            <h1><i class="fa-solid fa-mobile-screen-button"></i> App do Membro por Perfil</h1>
            <p id="userLabel">Carregando seu perfil...</p>
            <div class="chips" id="roleChips"></div>
        </section>

        <section class="stats" id="statsWrap"></section>

        <section class="quick-actions" id="actionsWrap"></section>

        <section class="panels">
            <article class="panel">
                <h2><i class="fa-solid fa-bullhorn"></i> Comunicacao recente</h2>
                <div id="listWhatsapp"></div>
            </article>
            <article class="panel">
                <h2><i class="fa-solid fa-list-check"></i> Portaria e pagamentos</h2>
                <div id="listPortaria"></div>
                <hr style="border:none;border-top:1px solid #e2e8f0;margin:8px 0;">
                <div id="listPayments"></div>
            </article>
        </section>
    </div>

    <script src="session.js"></script>
    <script src="pwa.js"></script>
    <script>
        requireAuthSession();

        const ROLE_ACTIONS = {
            admin: [
                { href: 'dashboard.html', label: 'Painel geral' },
                { href: 'oracoes.html', label: 'Orações' },
                { href: 'agenda.html', label: 'Agenda' },
                { href: 'portaria.html', label: 'Portaria' }
            ],
            secretaria: [
                { href: 'dashboard.html', label: 'Visao geral' },
                { href: 'oracoes.html', label: 'Orações' },
                { href: 'agenda.html', label: 'Agenda' },
                { href: 'portaria.html', label: 'Portaria' }
            ],
            pastor: [
                { href: 'oracoes.html', label: 'Orações' },
                { href: 'agenda.html', label: 'Agenda' },
                { href: 'membros.html', label: 'Membros' }
            ],
            oficial: [
                { href: 'portaria.html', label: 'Portaria' },
                { href: 'agenda.html', label: 'Agenda' },
                { href: 'oracoes.html', label: 'Orações' }
            ],
            membro: [
                { href: 'oracoes.html', label: 'Minhas orações' },
                { href: 'agenda.html', label: 'Agenda' }
            ],
            visitante: [
                { href: 'oracoes.html', label: 'Pedidos de oração' },
                { href: 'agenda.html', label: 'Agenda' }
            ]
        };

        const FEATURE_TO_ACTION = {
            dashboard: { href: 'dashboard.html', label: 'Painel geral' },
            membros: { href: 'membros.html', label: 'Membros' },
            visitantes: { href: 'visitantes.html', label: 'Visitantes' },
            agenda: { href: 'agenda.html', label: 'Agenda' },
            oracoes: { href: 'oracoes.html', label: 'Orações' },
            financeiro: { href: 'financeiro.html', label: 'Financeiro' },
            midia: { href: 'app_midia.html', label: 'App Midia' }
        };

        function renderStats(stats) {
            const node = document.getElementById('statsWrap');
            node.innerHTML = `
                <div class="stat"><small>Templates ativos</small><strong>${stats.templatesAtivos}</strong></div>
                <div class="stat"><small>Envios hoje</small><strong>${stats.enviosHoje}</strong></div>
                <div class="stat"><small>Check-ins hoje</small><strong>${stats.checkinsHoje}</strong></div>
                <div class="stat"><small>Pagamentos pendentes</small><strong>${stats.pagamentosPendentes}</strong></div>
            `;
        }

        function renderActions(role, features) {
            const node = document.getElementById('actionsWrap');
            const mapped = (features || []).map((feature) => FEATURE_TO_ACTION[feature]).filter(Boolean);
            const actions = mapped.length ? mapped : (ROLE_ACTIONS[role] || ROLE_ACTIONS.membro);
            node.innerHTML = actions.map((item) => `<a class="action" href="${item.href}">${item.label}</a>`).join('');
        }

        function renderList(nodeId, items, renderer, emptyText) {
            const node = document.getElementById(nodeId);
            if (!items.length) {
                node.innerHTML = `<div class="muted">${emptyText}</div>`;
                return;
            }
            node.innerHTML = items.map(renderer).join('');
        }

        async function loadContext() {
            const [contextResp, permsResp] = await Promise.all([
                fetch('/app-membro/context'),
                fetch('/app-membro/permissions')
            ]);

            if (!contextResp.ok) {
                throw new Error('Nao foi possivel carregar o contexto do app membro.');
            }

            const response = contextResp;
            if (!response.ok) {
                throw new Error('Nao foi possivel carregar o contexto do app membro.');
            }

            const data = await response.json();
            const permsData = permsResp.ok ? await permsResp.json() : { features: [] };

            document.getElementById('userLabel').textContent = `${data.user.nome} • Perfil: ${data.user.role}`;
            document.getElementById('roleChips').innerHTML = `
                <span class="chip">Igreja ${data.user.igrejaId}</span>
                <span class="chip">${data.user.role}</span>
                <span class="chip">${data.user.email}</span>
            `;

            renderStats(data.quickStats);
            renderActions(data.user.role, permsData.features);

            renderList(
                'listWhatsapp',
                data.recent.whatsapp || [],
                (item) => `<div class="item"><strong>${item.gatilho}</strong><br><span class="muted">${item.destino} • ${item.status}</span></div>`,
                'Nenhum envio recente.'
            );

            renderList(
                'listPortaria',
                data.recent.checkins || [],
                (item) => `<div class="item"><strong>${item.nome_visitante}</strong><br><span class="muted">${item.evento || 'Sem evento'} • ${item.status}</span></div>`,
                'Nenhum check-in recente.'
            );

            renderList(
                'listPayments',
                data.recent.payments || [],
                (item) => `<div class="item"><strong>${item.descricao}</strong><br><span class="muted">R$ ${Number(item.valor).toFixed(2)} • ${item.status}</span></div>`,
                'Nenhum pagamento recente.'
            );
        }

        loadContext().catch((error) => {
            document.getElementById('userLabel').textContent = error.message;
        });
    </script>
</body>
</html>
