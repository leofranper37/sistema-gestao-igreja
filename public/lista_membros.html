<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Lista de Membros</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .members-wrap {
            padding: 24px 30px 30px;
        }

        .page-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .page-header h2 {
            margin: 0;
            color: #0f172a;
            font-size: 26px;
        }

        .page-header p {
            margin: 6px 0 0;
            color: #64748b;
            font-size: 13px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(90deg, #0ea5e9 0%, #10b981 100%);
            color: #fff;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }

        .filters-card,
        .table-container {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
        }

        .filters-card {
            padding: 18px;
            margin-bottom: 18px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.04em;
        }

        .form-group input,
        .form-group select {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.14);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid #e2e8f0;
            gap: 10px;
            flex-wrap: wrap;
        }

        .table-header h3 {
            margin: 0;
            font-size: 16px;
            color: #0f172a;
        }

        .table-header small {
            color: #64748b;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8fafc;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 13px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
            color: #334155;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-ativo {
            background: #dcfce7;
            color: #166534;
        }

        .badge-visitante {
            background: #e0f2fe;
            color: #075985;
        }

        .badge-inativo {
            background: #e5e7eb;
            color: #4b5563;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: #e2e8f0;
            color: #334155;
        }

        .action-btn:hover {
            background: #cbd5e1;
        }

        .empty {
            text-align: center;
            color: #94a3b8;
            padding: 32px 10px;
        }

        @media (max-width: 800px) {
            .members-wrap {
                padding: 18px 16px 20px;
            }

            th,
            td {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Lista de Membros" data-shell-breadcrumb="LDFP / Secretaria / Lista de Membros" data-shell-active="lista_membros.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="members-wrap">
            <div class="page-header">
                <div>
                    <h2>Lista de Membros</h2>
                    <p>Gerencie o cadastro completo da igreja com filtros rápidos.</p>
                </div>
                <button class="btn btn-primary" onclick="window.location.href='membros.html'">
                    <i class="fa-solid fa-plus"></i> Novo Membro
                </button>
            </div>

            <div class="filters-card">
                <div class="filter-row">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="filterNome" placeholder="Digite o nome">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="filterEmail" placeholder="Digite o email">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="filterTelefone" placeholder="Digite o telefone">
                    </div>
                    <div class="form-group">
                        <label>Situação</label>
                        <select id="filterSituacao">
                            <option value="">Todas</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Visitante">Visitante</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" id="btnAplicar"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
                    <button class="btn btn-secondary" id="btnLimpar"><i class="fa-solid fa-rotate-right"></i> Limpar</button>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h3 id="memberCount">Carregando...</h3>
                    <small id="lastUpdate">Atualizado agora</small>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Situação</th>
                            <th>Cadastro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="membersBody">
                        <tr><td colspan="6" class="empty">Carregando membros...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const members = [];

        async function loadMembers() {
            try {
                const response = await fetch('/membros');
                const data = await response.json();
                return Array.isArray(data) ? data : (data.items || []);
            } catch (_error) {
                return [];
            }
        }

        function badgeClass(situacao) {
            if (situacao === 'Visitante') return 'badge-visitante';
            if (situacao === 'Inativo') return 'badge-inativo';
            return 'badge-ativo';
        }

        function renderTable(rows) {
            const tbody = document.getElementById('membersBody');
            const count = document.getElementById('memberCount');

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum membro encontrado.</td></tr>';
                count.textContent = '0 membros';
                return;
            }

            count.textContent = `${rows.length} membro${rows.length !== 1 ? 's' : ''}`;

            tbody.innerHTML = rows.map((member) => {
                const situacao = member.situacao || 'Ativo';
                const dataCadastro = member.created_at
                    ? new Intl.DateTimeFormat('pt-BR').format(new Date(member.created_at))
                    : '--/--/----';

                return `
                    <tr>
                        <td><strong>${member.full_name || member.nome || '--'}</strong></td>
                        <td>${member.email || '--'}</td>
                        <td>${member.phone || member.telefone || '--'}</td>
                        <td><span class="badge ${badgeClass(situacao)}">${situacao}</span></td>
                        <td>${dataCadastro}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="window.location.href='membros.html?id=${member.id}'">Editar</button>
                                <button class="action-btn" onclick="deleteMember(${member.id})">Excluir</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function applyFilters() {
            const nome = document.getElementById('filterNome').value.toLowerCase();
            const email = document.getElementById('filterEmail').value.toLowerCase();
            const telefone = document.getElementById('filterTelefone').value.toLowerCase();
            const situacao = document.getElementById('filterSituacao').value;

            const filtered = members.filter((member) => {
                const nomeMatch = (member.full_name || member.nome || '').toLowerCase().includes(nome);
                const emailMatch = (member.email || '').toLowerCase().includes(email);
                const telefoneMatch = (member.phone || member.telefone || '').toLowerCase().includes(telefone);
                const situacaoMatch = !situacao || (member.situacao || 'Ativo') === situacao;
                return nomeMatch && emailMatch && telefoneMatch && situacaoMatch;
            });

            renderTable(filtered);
            document.getElementById('lastUpdate').textContent = 'Filtro aplicado agora';
        }

        function clearFilters() {
            document.getElementById('filterNome').value = '';
            document.getElementById('filterEmail').value = '';
            document.getElementById('filterTelefone').value = '';
            document.getElementById('filterSituacao').value = '';
            renderTable(members);
            document.getElementById('lastUpdate').textContent = 'Filtros limpos';
        }

        function deleteMember(id) {
            if (!confirm('Deseja excluir este membro?')) {
                return;
            }

            fetch(`/membros/${id}`, { method: 'DELETE' })
                .then((response) => {
                    if (!response.ok) {
                        throw new Error('Erro ao excluir membro.');
                    }
                    location.reload();
                })
                .catch((error) => {
                    alert(error.message || 'Erro ao excluir membro.');
                });
        }

        document.getElementById('btnAplicar').addEventListener('click', applyFilters);
        document.getElementById('btnLimpar').addEventListener('click', clearFilters);

        (async () => {
            const data = await loadMembers();
            members.push(...data);
            renderTable(members);
            document.getElementById('lastUpdate').textContent = new Intl.DateTimeFormat('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            }).format(new Date());
        })();
    </script>
</body>
</html>
