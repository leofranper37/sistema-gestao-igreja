<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Nova Categoria de Grupo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap {
            padding: 24px 30px 30px;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            max-width: 720px;
        }

        .form-head {
            padding: 12px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        .form-body {
            padding: 16px;
            display: grid;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .field input,
        .field textarea {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .field textarea {
            min-height: 90px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
        }

        .btn-ghost {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px 14px;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
        }

        .status {
            font-size: 12px;
            font-weight: 600;
            color: #047857;
        }

        .status.error {
            color: #b91c1c;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Nova Categoria" data-shell-breadcrumb="LDFP / Secretaria / Grupos / Categorias / Nova Categoria" data-shell-active="grupos_categorias.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="form-card">
                <div class="form-head" id="formHead">Nova Categoria</div>
                <form id="categoryForm" class="form-body">
                    <div class="field">
                        <label for="nomeCategoria">Nome da Categoria</label>
                        <input type="text" id="nomeCategoria" placeholder="Nome da categoria" required>
                    </div>
                    <div class="field">
                        <label for="descricaoCategoria">Descrição</label>
                        <textarea id="descricaoCategoria" placeholder="Descrição da categoria"></textarea>
                    </div>
                    <div class="actions">
                        <button class="btn-primary" type="submit" id="btnSalvar">Salvar</button>
                        <button class="btn-ghost" type="button" id="btnVoltar">Voltar</button>
                        <span class="status" id="statusMsg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const STORAGE_KEY = 'ldfpGroupCategories';
        const form = document.getElementById('categoryForm');
        const statusMsg = document.getElementById('statusMsg');
        const formHead = document.getElementById('formHead');
        const btnSalvar = document.getElementById('btnSalvar');

        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        function readCategories() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function writeCategories(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return String(Date.now());
        }

        function loadEditData() {
            if (!editingId) {
                return;
            }

            const item = readCategories().find((entry) => String(entry.id) === String(editingId));
            if (!item) {
                statusMsg.textContent = 'Categoria não encontrada para edição.';
                statusMsg.classList.add('error');
                return;
            }

            document.getElementById('nomeCategoria').value = item.nome || '';
            document.getElementById('descricaoCategoria').value = item.descricao || '';
            formHead.textContent = 'Editar Categoria';
            btnSalvar.textContent = 'Atualizar';
        }

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'grupos_categorias.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const nome = document.getElementById('nomeCategoria').value.trim();
            const descricao = document.getElementById('descricaoCategoria').value.trim();

            if (!nome) {
                statusMsg.textContent = 'Informe o nome da categoria.';
                statusMsg.classList.add('error');
                return;
            }

            const categories = readCategories();

            if (editingId) {
                const index = categories.findIndex((entry) => String(entry.id) === String(editingId));
                if (index >= 0) {
                    categories[index] = {
                        ...categories[index],
                        nome,
                        descricao,
                        updatedAt: new Date().toISOString()
                    };
                }
                statusMsg.textContent = 'Categoria atualizada com sucesso!';
            } else {
                categories.push({
                    id: makeId(),
                    nome,
                    descricao,
                    createdAt: new Date().toISOString()
                });
                statusMsg.textContent = 'Categoria salva com sucesso!';
                form.reset();
            }

            statusMsg.classList.remove('error');
            writeCategories(categories);
        });

        loadEditData();
    </script>
</body>
</html>
