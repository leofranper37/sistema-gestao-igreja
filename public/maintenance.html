<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Em Manutenção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f1f5f9;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }
        h1 { font-size: 32px; margin-bottom: 15px; font-weight: 800; }
        p { font-size: 16px; color: #cbd5e1; margin-bottom: 30px; line-height: 1.6; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        .contact {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .contact a { color: #f59e0b; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>LDFP em Manutenção</h1>
        <p>Estamos realizando melhorias importantes no sistema. Voltaremos em breve com uma experiência ainda melhor para sua igreja.</p>
        <div class="contact">
            <p style="margin-bottom: 10px;">Dúvidas?</p>
            <a href="mailto:contato@ldfp.com.br">contato@ldfp.com.br</a>
        </div>
    </div>
</body>
</html>
