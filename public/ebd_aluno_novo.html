<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Novo Aluno EBD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap { padding: 24px 30px 30px; }
        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            max-width: 920px;
        }
        .form-head {
            padding: 12px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }
        .form-body { padding: 16px; display: grid; gap: 12px; }
        .section {
            background: #ffffff;
            border: 1px solid #e9edf4;
            border-radius: 8px;
            padding: 10px;
        }
        .section-title {
            margin: 0 0 10px;
            font-size: 12px;
            font-weight: 700;
            color: #92400e;
            border-bottom: 1px solid #fcd34d;
            padding-bottom: 6px;
            text-transform: uppercase;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .grid-5 {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 12px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label {
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .field input, .field select {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            background: #fff;
        }
        .btn-mini {
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            color: #111827;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: #fde68a;
        }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
        }
        .btn-ghost {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px 14px;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
        }
        .status { font-size: 12px; font-weight: 600; color: #92400e; }
        .status.error { color: #b91c1c; }
        @media (max-width: 900px) {
            .grid-3, .grid-5 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Novo Aluno" data-shell-breadcrumb="LDFP / Secretaria / EBD / Alunos / Novo Aluno" data-shell-active="ebd_alunos.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="form-card">
                <div class="form-head" id="formHead">Novo Aluno</div>
                <form id="studentForm" class="form-body">
                    <div class="section">
                        <h3 class="section-title">Turma e Matricula</h3>
                        <div class="grid-3">
                            <div class="field">
                                <label for="turmaAluno">Turma</label>
                                <input type="text" id="turmaAluno" placeholder="Nome da turma" required>
                            </div>
                            <div class="field">
                                <label for="estagioAluno">Estagio</label>
                                <select id="estagioAluno">
                                    <option value="">Selecione...</option>
                                    <option value="Novo Convertido">Novo Convertido</option>
                                    <option value="Intermediario">Intermediario</option>
                                    <option value="Avancado">Avancado</option>
                                </select>
                            </div>
                            <div class="field">
                                <label for="matriculaAluno">Matricula EBD</label>
                                <input type="text" id="matriculaAluno" placeholder="Numero da matricula">
                            </div>
                        </div>
                        <div class="actions" style="margin-top: 10px;">
                            <button class="btn-mini" type="button" id="btnImportarPessoa"><i class="fa-solid fa-user-plus"></i> Importar Pessoa</button>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">Dados Pessoais</h3>
                        <div class="grid-5">
                            <div class="field">
                                <label for="nomeAluno">Nome</label>
                                <input type="text" id="nomeAluno" placeholder="Nome do aluno" required>
                            </div>
                            <div class="field">
                                <label for="sexoAluno">Sexo</label>
                                <select id="sexoAluno">
                                    <option value="">Selecione...</option>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                </select>
                            </div>
                            <div class="field">
                                <label for="nascimentoAluno">Nascimento</label>
                                <input type="date" id="nascimentoAluno">
                            </div>
                            <div class="field">
                                <label for="estadoCivilAluno">Estado Civil</label>
                                <select id="estadoCivilAluno">
                                    <option value="">Selecione...</option>
                                    <option value="Solteiro(a)">Solteiro(a)</option>
                                    <option value="Casado(a)">Casado(a)</option>
                                    <option value="Viuvo(a)">Viuvo(a)</option>
                                    <option value="Divorciado(a)">Divorciado(a)</option>
                                </select>
                            </div>
                            <div class="field">
                                <label for="profissaoAluno">Profissao</label>
                                <input type="text" id="profissaoAluno" placeholder="Profissao">
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">Contatos</h3>
                        <div class="grid-3">
                            <div class="field">
                                <label for="emailAluno">Email</label>
                                <input type="email" id="emailAluno" placeholder="email@exemplo.com">
                            </div>
                            <div class="field">
                                <label for="telefoneAluno">Telefone</label>
                                <input type="text" id="telefoneAluno" placeholder="(00) 0000-0000">
                            </div>
                            <div class="field">
                                <label for="celularAluno">Celular</label>
                                <input type="text" id="celularAluno" placeholder="(00) 00000-0000">
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">Endereco</h3>
                        <div class="grid-5">
                            <div class="field">
                                <label for="cepAluno">CEP</label>
                                <input type="text" id="cepAluno" placeholder="00000-000">
                            </div>
                            <div class="field" style="grid-column: span 2;">
                                <label for="enderecoAluno">Endereco</label>
                                <input type="text" id="enderecoAluno" placeholder="Rua, numero e complemento">
                            </div>
                            <div class="field">
                                <label for="bairroAluno">Bairro</label>
                                <input type="text" id="bairroAluno" placeholder="Bairro">
                            </div>
                            <div class="field">
                                <label for="cidadeAluno">Cidade</label>
                                <input type="text" id="cidadeAluno" placeholder="Cidade">
                            </div>
                        </div>
                        <div class="grid-3" style="margin-top: 12px;">
                            <div class="field">
                                <label for="estadoAluno">Estado</label>
                                <select id="estadoAluno">
                                    <option value="">Selecione...</option>
                                    <option value="AC">AC</option>
                                    <option value="AL">AL</option>
                                    <option value="AM">AM</option>
                                    <option value="AP">AP</option>
                                    <option value="BA">BA</option>
                                    <option value="CE">CE</option>
                                    <option value="DF">DF</option>
                                    <option value="ES">ES</option>
                                    <option value="GO">GO</option>
                                    <option value="MA">MA</option>
                                    <option value="MG">MG</option>
                                    <option value="MS">MS</option>
                                    <option value="MT">MT</option>
                                    <option value="PA">PA</option>
                                    <option value="PB">PB</option>
                                    <option value="PE">PE</option>
                                    <option value="PI">PI</option>
                                    <option value="PR">PR</option>
                                    <option value="RJ">RJ</option>
                                    <option value="RN">RN</option>
                                    <option value="RO">RO</option>
                                    <option value="RR">RR</option>
                                    <option value="RS">RS</option>
                                    <option value="SC">SC</option>
                                    <option value="SE">SE</option>
                                    <option value="SP">SP</option>
                                    <option value="TO">TO</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn-primary" type="submit" id="btnSalvar">Salvar</button>
                        <button class="btn-ghost" type="button" id="btnVoltar">Voltar</button>
                        <span class="status" id="statusMsg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const STORAGE_KEY = 'ldfpEbdStudents';
        const form = document.getElementById('studentForm');
        const statusMsg = document.getElementById('statusMsg');
        const formHead = document.getElementById('formHead');
        const btnSalvar = document.getElementById('btnSalvar');

        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        function readStudents() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function writeStudents(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return String(Date.now());
        }

        function loadEditData() {
            if (!editingId) return;

            const item = readStudents().find((entry) => String(entry.id) === String(editingId));
            if (!item) {
                statusMsg.textContent = 'Aluno nao encontrado para edicao.';
                statusMsg.classList.add('error');
                return;
            }

            document.getElementById('nomeAluno').value = item.nome || '';
            document.getElementById('estagioAluno').value = item.estagio || '';
            document.getElementById('turmaAluno').value = item.turma || '';
            document.getElementById('matriculaAluno').value = item.matricula || '';
            document.getElementById('sexoAluno').value = item.sexo || '';
            document.getElementById('nascimentoAluno').value = item.nascimento || '';
            document.getElementById('estadoCivilAluno').value = item.estadoCivil || '';
            document.getElementById('profissaoAluno').value = item.profissao || '';
            document.getElementById('emailAluno').value = item.email || '';
            document.getElementById('telefoneAluno').value = item.telefone || '';
            document.getElementById('celularAluno').value = item.celular || '';
            document.getElementById('cepAluno').value = item.cep || '';
            document.getElementById('enderecoAluno').value = item.endereco || '';
            document.getElementById('bairroAluno').value = item.bairro || '';
            document.getElementById('cidadeAluno').value = item.cidade || '';
            document.getElementById('estadoAluno').value = item.estado || '';
            formHead.textContent = 'Editar Aluno';
            btnSalvar.textContent = 'Atualizar';
        }

        document.getElementById('btnImportarPessoa').addEventListener('click', () => {
            statusMsg.textContent = 'Importacao rapida disponivel em breve. Preencha os campos manualmente.';
            statusMsg.classList.remove('error');
        });

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'ebd_alunos.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const nome = document.getElementById('nomeAluno').value.trim();
            const estagio = document.getElementById('estagioAluno').value.trim();
            const turma = document.getElementById('turmaAluno').value.trim();
            const matricula = document.getElementById('matriculaAluno').value.trim();
            const sexo = document.getElementById('sexoAluno').value.trim();
            const nascimento = document.getElementById('nascimentoAluno').value;
            const estadoCivil = document.getElementById('estadoCivilAluno').value.trim();
            const profissao = document.getElementById('profissaoAluno').value.trim();
            const email = document.getElementById('emailAluno').value.trim();
            const telefone = document.getElementById('telefoneAluno').value.trim();
            const celular = document.getElementById('celularAluno').value.trim();
            const cep = document.getElementById('cepAluno').value.trim();
            const endereco = document.getElementById('enderecoAluno').value.trim();
            const bairro = document.getElementById('bairroAluno').value.trim();
            const cidade = document.getElementById('cidadeAluno').value.trim();
            const estado = document.getElementById('estadoAluno').value.trim();

            if (!nome || !turma) {
                statusMsg.textContent = 'Informe pelo menos Nome e Turma.';
                statusMsg.classList.add('error');
                return;
            }

            const students = readStudents();

            if (editingId) {
                const index = students.findIndex((entry) => String(entry.id) === String(editingId));
                if (index >= 0) {
                    students[index] = {
                        ...students[index],
                        nome,
                        estagio,
                        turma,
                        matricula,
                        sexo,
                        nascimento,
                        estadoCivil,
                        profissao,
                        email,
                        telefone,
                        celular,
                        cep,
                        endereco,
                        bairro,
                        cidade,
                        estado,
                        updatedAt: new Date().toISOString()
                    };
                }
                statusMsg.textContent = 'Aluno atualizado com sucesso!';
            } else {
                students.push({
                    id: makeId(),
                    nome,
                    estagio,
                    turma,
                    matricula,
                    sexo,
                    nascimento,
                    estadoCivil,
                    profissao,
                    email,
                    telefone,
                    celular,
                    cep,
                    endereco,
                    bairro,
                    cidade,
                    estado,
                    createdAt: new Date().toISOString()
                });
                statusMsg.textContent = 'Aluno salvo com sucesso!';
                form.reset();
            }

            statusMsg.classList.remove('error');
            writeStudents(students);
        });

        loadEditData();
    </script>
</body>
</html>
