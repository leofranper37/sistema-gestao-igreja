<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Relatorios Secretaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .rs-wrap { padding: 24px 26px 44px; }
        .rs-hero {
            border-radius: 18px;
            padding: 20px;
            color: #e2e8f0;
            background:
                radial-gradient(circle at 82% 16%, rgba(14, 165, 233, .24), rgba(14, 165, 233, 0) 40%),
                radial-gradient(circle at 18% 26%, rgba(16, 185, 129, .22), rgba(16, 185, 129, 0) 44%),
                linear-gradient(135deg, #0f172a 0%, #0b3340 55%, #115e59 100%);
            box-shadow: 0 18px 34px rgba(15, 23, 42, .22);
            margin-bottom: 14px;
        }
        .rs-hero h2 { margin: 0 0 6px; font-size: 28px; }
        .rs-hero p { margin: 0; color: #bfdbfe; font-size: 14px; }

        .rs-toolbar {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 8px;
        }

        .rs-toolbar input, .rs-toolbar button {
            border-radius: 10px;
            border: 1px solid #dbe6f3;
            padding: 10px 12px;
            font-size: 13px;
        }

        .rs-toolbar button {
            cursor: pointer;
            font-weight: 700;
            color: #fff;
            border: 0;
            background: linear-gradient(135deg, #0ea5e9, #0f766e);
        }

        .rs-grid {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .rs-stat {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid #d9e4f0;
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15,23,42,.08);
            padding: 12px;
        }

        .rs-stat small { color: #64748b; font-size: 12px; }
        .rs-stat b { display: block; margin-top: 4px; color: #0f172a; font-size: 25px; }

        .rs-panels {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1.15fr .85fr;
            gap: 10px;
        }

        .rs-card {
            background: #fff;
            border: 1px solid #d9e4f0;
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15,23,42,.08);
            padding: 14px;
        }

        .rs-card h3 { margin: 0 0 8px; color: #0f172a; font-size: 16px; }

        .rs-table-wrap { overflow-x: auto; }
        .rs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rs-table th { background: #eff6ff; color: #475569; text-align: left; font-size: 11px; text-transform: uppercase; padding: 8px; }
        .rs-table td { border-bottom: 1px solid #f1f5f9; padding: 8px; color: #1e293b; }

        .rs-empty { color: #94a3b8; text-align: center; padding: 20px; font-size: 13px; }

        .rs-bars { display: grid; gap: 8px; }
        .rs-bar-row { display: grid; grid-template-columns: 90px 1fr 44px; align-items: center; gap: 8px; }
        .rs-bar {
            height: 10px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }
        .rs-bar > span {
            display: block;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #0ea5e9, #10b981);
        }

        .rs-msg { margin-top: 10px; font-size: 13px; color: #0f766e; }
        .rs-msg.error { color: #b91c1c; }

        @media (max-width: 980px) {
            .rs-wrap { padding: 16px; }
            .rs-toolbar { grid-template-columns: 1fr 1fr; }
            .rs-panels { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Relatorios Secretaria" data-shell-breadcrumb="LDFP / Relatorios / Secretaria" data-shell-active="relatorios_secretaria.html" data-shell-chip="Analytics" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <section class="rs-wrap">
            <article class="rs-hero">
                <h2><i class="fa-solid fa-file-lines"></i> Relatorios Secretaria</h2>
                <p>Visao executiva de membros, visitantes e base ministerial com filtros rapidos e exportacao CSV.</p>
                <div class="rs-toolbar">
                    <input type="date" id="startDate" aria-label="Data inicial">
                    <input type="date" id="endDate" aria-label="Data final">
                    <button id="btnFiltrar" type="button"><i class="fa-solid fa-filter"></i> Filtrar</button>
                    <button id="btnCsv" type="button"><i class="fa-solid fa-file-export"></i> Exportar CSV</button>
                </div>
            </article>

            <div class="rs-grid">
                <div class="rs-stat"><small>Membros</small><b id="stMembros">0</b></div>
                <div class="rs-stat"><small>Visitantes</small><b id="stVisitantes">0</b></div>
                <div class="rs-stat"><small>Congregados</small><b id="stCongregados">0</b></div>
                <div class="rs-stat"><small>Criancas</small><b id="stCriancas">0</b></div>
            </div>

            <div class="rs-panels">
                <article class="rs-card">
                    <h3>Ultimos cadastros (membros)</h3>
                    <div class="rs-table-wrap">
                        <table class="rs-table">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Cidade</th>
                                    <th>Criado em</th>
                                </tr>
                            </thead>
                            <tbody id="tbMembros"></tbody>
                        </table>
                    </div>
                </article>

                <article class="rs-card">
                    <h3>Situacao dos membros</h3>
                    <div class="rs-bars" id="barsSituacao"></div>

                    <h3 style="margin-top:14px;">Top cidades (visitantes)</h3>
                    <div class="rs-bars" id="barsCidades"></div>
                </article>
            </div>

            <div id="statusMsg" class="rs-msg"></div>
        </section>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const state = {
            membros: [],
            visitantes: [],
            congregados: [],
            criancas: []
        };

        function setMsg(text, isError) {
            const el = document.getElementById('statusMsg');
            el.className = isError ? 'rs-msg error' : 'rs-msg';
            el.textContent = text || '';
        }

        function toItems(payload) {
            if (Array.isArray(payload)) return payload;
            if (payload && Array.isArray(payload.items)) return payload.items;
            return [];
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || 'Falha ao consultar ' + url);
            }
            return data;
        }

        function parseDate(val) {
            if (!val) return null;
            const d = new Date(val);
            return Number.isNaN(d.getTime()) ? null : d;
        }

        function inRange(dateVal, startVal, endVal) {
            const d = parseDate(dateVal);
            if (!d) return true;
            if (startVal) {
                const s = new Date(startVal + 'T00:00:00');
                if (d < s) return false;
            }
            if (endVal) {
                const e = new Date(endVal + 'T23:59:59');
                if (d > e) return false;
            }
            return true;
        }

        function countBy(rows, picker) {
            return rows.reduce((acc, row) => {
                const key = picker(row) || 'Nao informado';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
        }

        function renderBars(containerId, mapObj, limit) {
            const wrap = document.getElementById(containerId);
            const entries = Object.entries(mapObj).sort((a, b) => b[1] - a[1]).slice(0, limit || 5);
            if (!entries.length) {
                wrap.innerHTML = '<div class="rs-empty">Sem dados no periodo.</div>';
                return;
            }
            const max = entries[0][1] || 1;
            wrap.innerHTML = entries.map((entry) => {
                const width = Math.max(6, Math.round((entry[1] / max) * 100));
                return `
                    <div class="rs-bar-row">
                        <span>${entry[0]}</span>
                        <div class="rs-bar"><span style="width:${width}%"></span></div>
                        <b style="font-size:12px;color:#0f172a;">${entry[1]}</b>
                    </div>
                `;
            }).join('');
        }

        function renderTableMembros(rows) {
            const tbody = document.getElementById('tbMembros');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="rs-empty">Nenhum membro no filtro.</td></tr>';
                return;
            }
            const fmt = new Intl.DateTimeFormat('pt-BR');
            tbody.innerHTML = rows.slice(0, 10).map((m) => {
                const created = parseDate(m.created_at || m.createdAt);
                return `
                    <tr>
                        <td>${m.nome || m.full_name || '-'}</td>
                        <td>${m.email || '-'}</td>
                        <td>${m.cidade || '-'}</td>
                        <td>${created ? fmt.format(created) : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function exportCsv(rows, fileName) {
            const header = ['tipo', 'nome', 'email', 'telefone', 'cidade', 'situacao', 'created_at'];
            const lines = [header.join(';')];
            rows.forEach((r) => {
                const vals = header.map((h) => {
                    const val = r[h] === undefined || r[h] === null ? '' : String(r[h]);
                    return '"' + val.replace(/"/g, '""') + '"';
                });
                lines.push(vals.join(';'));
            });
            const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function applyView() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            const membros = state.membros.filter((x) => inRange(x.created_at || x.createdAt, start, end));
            const visitantes = state.visitantes.filter((x) => inRange(x.created_at || x.createdAt, start, end));
            const congregados = state.congregados.filter((x) => inRange(x.created_at || x.createdAt, start, end));
            const criancas = state.criancas.filter((x) => inRange(x.created_at || x.createdAt, start, end));

            document.getElementById('stMembros').textContent = membros.length;
            document.getElementById('stVisitantes').textContent = visitantes.length;
            document.getElementById('stCongregados').textContent = congregados.length;
            document.getElementById('stCriancas').textContent = criancas.length;

            renderTableMembros(membros);
            renderBars('barsSituacao', countBy(membros, (m) => m.situacao || 'Ativo'), 6);
            renderBars('barsCidades', countBy(visitantes, (v) => v.cidade || 'Nao informado'), 6);

            document.getElementById('btnCsv').onclick = () => {
                const rows = [];
                membros.forEach((m) => rows.push({ tipo: 'membro', nome: m.nome || m.full_name, email: m.email, telefone: m.telefone || m.phone, cidade: m.cidade, situacao: m.situacao, created_at: m.created_at || m.createdAt }));
                visitantes.forEach((v) => rows.push({ tipo: 'visitante', nome: v.nome, email: v.email, telefone: v.telefone, cidade: v.cidade, situacao: v.status, created_at: v.created_at || v.createdAt }));
                exportCsv(rows, 'relatorio_secretaria.csv');
            };
        }

        async function init() {
            setMsg('Carregando dados...');
            try {
                const [membros, visitantes, congregados, criancas] = await Promise.all([
                    fetchJson('/membros?limit=1000&meta=1&sortBy=created_at&sortOrder=desc'),
                    fetchJson('/visitantes?limit=1000&meta=1&sortBy=created_at&sortOrder=desc'),
                    fetchJson('/congregados?limit=1000&meta=1'),
                    fetchJson('/criancas?limit=1000&meta=1')
                ]);

                state.membros = toItems(membros);
                state.visitantes = toItems(visitantes);
                state.congregados = toItems(congregados);
                state.criancas = toItems(criancas);

                applyView();
                setMsg('Relatorio atualizado com sucesso.');
            } catch (error) {
                setMsg(error.message || 'Falha ao carregar relatorio.', true);
            }
        }

        document.getElementById('btnFiltrar').addEventListener('click', applyView);
        init();
    </script>
</body>
</html>
