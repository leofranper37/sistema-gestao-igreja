<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Outras Igrejas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .igrejas-wrap {
            padding: 22px 28px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .box {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .box-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: linear-gradient(120deg, #f8fafc 0%, #fff7ed 100%);
        }

        .box-title {
            margin: 0;
            font-size: 1rem;
            color: #0f172a;
        }

        .box-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 0.84rem;
            cursor: pointer;
        }

        .btn-primary {
            border: 0;
            background: #0f766e;
            color: #fff;
        }

        .btn-light {
            border: 1px solid #dbe3ee;
            background: #fff;
            color: #334155;
        }

        .search-area {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-area input {
            flex: 1;
            border: 1px solid #dbe3ee;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 0.85rem;
        }

        .table-wrap {
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 880px;
        }

        th,
        td {
            border-bottom: 1px solid #edf2f7;
            padding: 10px;
            font-size: 0.82rem;
            text-align: left;
            color: #334155;
        }

        th {
            background: #f8fafc;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.03em;
            color: #64748b;
        }

        .empty {
            padding: 18px;
            color: #94a3b8;
            text-align: center;
            font-size: 0.84rem;
        }

        .row-actions {
            display: flex;
            gap: 6px;
        }

        .row-actions button {
            border: 1px solid #dbe3ee;
            background: #fff;
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 0.72rem;
            cursor: pointer;
        }

        .row-actions button.delete {
            color: #b91c1c;
            border-color: #fecaca;
            background: #fef2f2;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            z-index: 130;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            width: min(860px, 94vw);
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
            padding: 16px;
        }

        .modal h3 {
            margin: 0 0 12px;
            color: #0f172a;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field.col-2 { grid-column: span 2; }
        .field.col-3 { grid-column: span 3; }
        .field.col-4 { grid-column: span 4; }

        .field label {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
        }

        .field input {
            border: 1px solid #dbe3ee;
            border-radius: 8px;
            padding: 8px 9px;
            font-size: 0.84rem;
            font-family: inherit;
        }

        .modal-actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .message {
            margin-top: 8px;
            color: #b91c1c;
            font-size: 0.78rem;
        }

        @media (max-width: 1020px) {
            .igrejas-wrap {
                padding: 14px;
            }

            .form-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .field.col-3,
            .field.col-4 {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Outras Igrejas" data-shell-breadcrumb="LDFP / Secretaria / Outras Igrejas" data-shell-active="outras_igrejas.html" data-shell-chip="Cadastro ativo" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <section class="igrejas-wrap">
            <article class="box">
                <header class="box-header">
                    <h2 class="box-title">Cadastro de outras igrejas</h2>
                    <div class="box-actions">
                        <button type="button" class="btn btn-light" id="btnRefresh"><i class="fa-solid fa-rotate"></i> Atualizar</button>
                        <button type="button" class="btn btn-primary" id="btnNovo"><i class="fa-solid fa-plus"></i> Cadastrar igreja</button>
                    </div>
                </header>

                <div class="search-area">
                    <input type="search" id="searchInput" placeholder="Pesquisar por nome, cidade ou responsavel...">
                    <button type="button" class="btn btn-light" id="btnBuscar"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome da igreja</th>
                                <th>Sede / Congregacao</th>
                                <th>Cidade</th>
                                <th>Responsavel</th>
                                <th>Contato</th>
                                <th>Acoes</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyIgrejas"></tbody>
                    </table>
                </div>
                <div class="empty" id="emptyState" style="display:none;">Nenhuma igreja encontrada.</div>
            </article>
        </section>
    </main>

    <div class="modal-overlay" id="modalCadastro">
        <div class="modal">
            <h3 id="modalTitle">Cadastrar igreja</h3>
            <form id="formCadastro">
                <input type="hidden" id="rowId">

                <div class="form-grid">
                    <div class="field col-2">
                        <label>Nome da igreja</label>
                        <input id="nome" maxlength="255" required>
                    </div>
                    <div class="field col-2">
                        <label>Sede / Congregacao</label>
                        <input id="sede" maxlength="255">
                    </div>

                    <div class="field col-3">
                        <label>Endereco</label>
                        <input id="endereco" maxlength="255">
                    </div>
                    <div class="field">
                        <label>Bairro</label>
                        <input id="bairro" maxlength="150">
                    </div>

                    <div class="field col-2">
                        <label>Cidade</label>
                        <input id="cidade" maxlength="150">
                    </div>
                    <div class="field">
                        <label>Estado</label>
                        <input id="estado" maxlength="50">
                    </div>
                    <div class="field">
                        <label>CEP</label>
                        <input id="cep" maxlength="20">
                    </div>

                    <div class="field">
                        <label>Telefone</label>
                        <input id="telefone" maxlength="50">
                    </div>
                    <div class="field">
                        <label>Celular</label>
                        <input id="celular" maxlength="50">
                    </div>
                    <div class="field col-2">
                        <label>E-mail</label>
                        <input id="email" maxlength="255">
                    </div>

                    <div class="field col-2">
                        <label>Responsavel</label>
                        <input id="responsavel" maxlength="255">
                    </div>
                    <div class="field">
                        <label>Cargo</label>
                        <input id="cargo" maxlength="255">
                    </div>
                    <div class="field">
                        <label>Nascimento</label>
                        <input id="nascimento" type="date">
                    </div>

                    <div class="field col-4">
                        <label>Declaracao</label>
                        <input id="declaracao" maxlength="255" placeholder="Ex: CNPJ, observacao ou referencia">
                    </div>
                </div>

                <div class="message" id="formMessage"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-light" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const tbody = document.getElementById('tbodyIgrejas');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const modal = document.getElementById('modalCadastro');
        let currentRows = [];

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function setFormMessage(text = '') {
            document.getElementById('formMessage').textContent = text;
        }

        function buildContato(row) {
            const tel = row.telefone || '-';
            const cel = row.celular || '-';
            return `${tel} / ${cel}`;
        }

        function renderRows(rows) {
            currentRows = rows;
            tbody.innerHTML = '';

            if (!rows.length) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            rows.forEach((row) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${escapeHtml(row.nome)}</strong></td>
                    <td>${escapeHtml(row.sede || '-')}</td>
                    <td>${escapeHtml(row.cidade || '-')}</td>
                    <td>${escapeHtml(row.responsavel || '-')}</td>
                    <td>${escapeHtml(buildContato(row))}</td>
                    <td>
                        <div class="row-actions">
                            <button type="button" data-action="edit" data-id="${row.id}">Editar</button>
                            <button type="button" data-action="delete" data-id="${row.id}" class="delete">Excluir</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            tbody.querySelectorAll('button[data-action="edit"]').forEach((button) => {
                button.addEventListener('click', () => openModal(Number(button.dataset.id)));
            });

            tbody.querySelectorAll('button[data-action="delete"]').forEach((button) => {
                button.addEventListener('click', () => removeRow(Number(button.dataset.id)));
            });
        }

        async function carregarIgrejas() {
            const search = searchInput.value.trim();
            const query = new URLSearchParams();
            if (search) query.set('search', search);

            const response = await fetch(`/outras-igrejas?${query.toString()}`);
            if (!response.ok) {
                renderRows([]);
                return;
            }

            const rows = await response.json();
            renderRows(Array.isArray(rows) ? rows : []);
        }

        function mapField(id) {
            return document.getElementById(id);
        }

        function openModal(id = null) {
            setFormMessage('');
            document.getElementById('formCadastro').reset();
            mapField('rowId').value = '';

            if (!id) {
                document.getElementById('modalTitle').textContent = 'Cadastrar igreja';
                modal.classList.add('show');
                return;
            }

            const row = currentRows.find((item) => Number(item.id) === Number(id));
            if (!row) return;

            document.getElementById('modalTitle').textContent = 'Editar igreja';
            mapField('rowId').value = row.id;
            mapField('nome').value = row.nome || '';
            mapField('sede').value = row.sede || '';
            mapField('endereco').value = row.endereco || '';
            mapField('bairro').value = row.bairro || '';
            mapField('cidade').value = row.cidade || '';
            mapField('cep').value = row.cep || '';
            mapField('estado').value = row.estado || '';
            mapField('telefone').value = row.telefone || '';
            mapField('celular').value = row.celular || '';
            mapField('email').value = row.email || '';
            mapField('responsavel').value = row.responsavel || '';
            mapField('cargo').value = row.cargo || '';
            mapField('nascimento').value = row.nascimento || '';
            mapField('declaracao').value = row.declaracao || '';
            modal.classList.add('show');
        }

        function closeModal() {
            modal.classList.remove('show');
        }

        function collectPayload() {
            return {
                nome: mapField('nome').value.trim(),
                sede: mapField('sede').value.trim(),
                endereco: mapField('endereco').value.trim(),
                bairro: mapField('bairro').value.trim(),
                cidade: mapField('cidade').value.trim(),
                cep: mapField('cep').value.trim(),
                estado: mapField('estado').value.trim(),
                telefone: mapField('telefone').value.trim(),
                celular: mapField('celular').value.trim(),
                email: mapField('email').value.trim(),
                responsavel: mapField('responsavel').value.trim(),
                cargo: mapField('cargo').value.trim(),
                nascimento: mapField('nascimento').value || null,
                declaracao: mapField('declaracao').value.trim()
            };
        }

        async function submitForm(event) {
            event.preventDefault();
            setFormMessage('');

            const id = mapField('rowId').value;
            const payload = collectPayload();

            if (!payload.nome) {
                setFormMessage('Informe o nome da igreja.');
                return;
            }

            const url = id ? `/outras-igrejas/${id}` : '/outras-igrejas';
            const method = id ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                setFormMessage(data.error || 'Nao foi possivel salvar o cadastro.');
                return;
            }

            closeModal();
            await carregarIgrejas();
        }

        async function removeRow(id) {
            if (!confirm('Deseja excluir esta igreja?')) return;

            const response = await fetch(`/outras-igrejas/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                alert('Nao foi possivel excluir o registro.');
                return;
            }

            await carregarIgrejas();
        }

        document.getElementById('btnNovo').addEventListener('click', () => openModal());
        document.getElementById('btnRefresh').addEventListener('click', carregarIgrejas);
        document.getElementById('btnBuscar').addEventListener('click', carregarIgrejas);
        document.getElementById('btnCancelar').addEventListener('click', closeModal);
        document.getElementById('formCadastro').addEventListener('submit', submitForm);

        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                carregarIgrejas();
            }
        });

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        carregarIgrejas();
    </script>
</body>
</html>
