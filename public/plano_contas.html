<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Plano de Contas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contab-grid { display: grid; grid-template-columns: 1.1fr 1.9fr; gap: 16px; }
        .contab-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .06); padding: 16px; }
        .contab-card h3 { margin: 0 0 12px; color: #0f172a; }
        .field { margin-bottom: 10px; }
        .field label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .field input, .field select { width: 100%; border: 1px solid #dbe3ef; border-radius: 8px; padding: 9px 11px; font-size: 14px; }
        .contab-msg { min-height: 18px; margin-top: 8px; font-size: 12px; color: #0f766e; }
        .contab-msg.error { color: #b91c1c; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eef2f7; padding: 9px 8px; text-align: left; }
        th { font-size: 11px; color: #64748b; text-transform: uppercase; }
        .badge { display: inline-flex; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
        .badge-a { background: #dbeafe; color: #1d4ed8; }
        .badge-p { background: #dcfce7; color: #166534; }
        @media (max-width: 1050px) { .contab-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="theme-petroleo enterprise-shell-page" data-shell-title="Plano de Contas" data-shell-breadcrumb="LDFP / Contabilidade / Plano de Contas" data-shell-active="plano_contas.html" data-shell-chip="Contabilidade" data-shell-role="Admin">
<main class="main-content enterprise-main">
    <div class="enterprise-page-shell">
        <div class="enterprise-page-hero">
            <div>
                <h2>Plano de Contas</h2>
                <p>Estruture e mantenha as contas contábeis para lançamentos e balancetes do exercício.</p>
            </div>
            <div class="enterprise-page-badge"><i class="fa-solid fa-list-ol"></i> Módulo ativo</div>
        </div>

        <div class="contab-grid">
            <section class="contab-card">
                <h3><i class="fa-solid fa-plus"></i> Nova Conta</h3>
                <form id="formConta">
                    <div class="field">
                        <label for="codigoConta">Código</label>
                        <input id="codigoConta" placeholder="Ex: 1.01.01" required>
                    </div>
                    <div class="field">
                        <label for="nomeConta">Nome</label>
                        <input id="nomeConta" placeholder="Ex: Caixa" required>
                    </div>
                    <div class="field">
                        <label for="naturezaConta">Natureza</label>
                        <select id="naturezaConta" required>
                            <option value="ativo">Ativo</option>
                            <option value="passivo">Passivo</option>
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>
                    <button class="btn-primario" type="submit">Salvar Conta</button>
                    <div class="contab-msg" id="msgConta"></div>
                </form>
            </section>

            <section class="contab-card">
                <h3><i class="fa-solid fa-table"></i> Contas Cadastradas</h3>
                <div style="overflow:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nome</th>
                                <th>Natureza</th>
                            </tr>
                        </thead>
                        <tbody id="tbContas"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
</main>

<script src="session.js"></script>
<script src="enterprise-shell.js"></script>
<script>
    requireAuthSession();

    const tbContas = document.getElementById('tbContas');
    const msgConta = document.getElementById('msgConta');

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function setMsg(text, isError) {
        msgConta.className = isError ? 'contab-msg error' : 'contab-msg';
        msgConta.textContent = text || '';
    }

    async function renderContas() {
        const response = await fetch('/contabilidade/plano-contas');
        const data = await response.json().catch(() => ({ items: [] }));

        if (!response.ok) {
            throw new Error(data.error || 'Não foi possível carregar o plano de contas.');
        }

        const contas = data.items || [];
        if (!contas.length) {
            tbContas.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#64748b;padding:16px;">Nenhuma conta cadastrada.</td></tr>';
            return;
        }

        tbContas.innerHTML = contas.map((c) => `
            <tr>
                <td>${escapeHtml(c.codigo)}</td>
                <td>${escapeHtml(c.nome)}</td>
                <td><span class="badge ${c.natureza === 'ativo' || c.natureza === 'passivo' ? 'badge-a' : 'badge-p'}">${escapeHtml(c.natureza)}</span></td>
            </tr>
        `).join('');
    }

    document.getElementById('formConta').addEventListener('submit', async (event) => {
        event.preventDefault();
        const codigo = document.getElementById('codigoConta').value.trim();
        const nome = document.getElementById('nomeConta').value.trim();
        const natureza = document.getElementById('naturezaConta').value;

        if (!codigo || !nome) {
            setMsg('Preencha todos os campos.', true);
            return;
        }

        const response = await fetch('/contabilidade/plano-contas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigo, nome, natureza })
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
            setMsg(data.error || 'Não foi possível salvar a conta.', true);
            return;
        }

        event.target.reset();
        setMsg('Conta adicionada com sucesso.', false);
        await renderContas();
    });

    renderContas().catch((error) => {
        setMsg(error.message || 'Erro ao carregar dados.', true);
    });
</script>
</body>
</html>
