<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos da Igreja</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 20px 14px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.1);
            padding: 14px;
            margin-bottom: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 2fr auto;
            gap: 8px;
        }

        input, select {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .btn {
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid #e2e8f0;
            padding: 10px;
            font-size: 13px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            color: #475569;
            text-transform: uppercase;
            font-size: 11px;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .status.pendente {
            background: #fef3c7;
            color: #854d0e;
        }

        .status.pago {
            background: #dcfce7;
            color: #166534;
        }

        .status.aguardando_confirmacao {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .hint {
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
        }

        .row-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn.secondary {
            background: #334155;
        }

        .msg {
            font-size: 13px;
            color: #0f766e;
        }

        .msg.error {
            color: #b91c1c;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Pagamentos" data-shell-breadcrumb="LDFP / Tesouraria / Pagamentos" data-shell-active="pagamentos.html" data-shell-chip="Ambiente autenticado" data-shell-role="Financeiro">
    <main class="main-content enterprise-main">
        <div class="wrap">
            <section class="card">
                <h2 style="margin: 0 0 12px;">Criar link de pagamento</h2>
                <form id="formPagamento" class="grid">
                    <input type="text" id="descricao" placeholder="Descrição" required>
                    <input type="number" id="valor" step="0.01" min="0" placeholder="Valor" required>
                    <select id="provider">
                        <option value="pix">PIX</option>
                        <option value="cartao">Cartão</option>
                    </select>
                    <input type="text" id="pixKey" placeholder="Chave PIX (email, telefone, aleatória)">
                    <button class="btn" type="submit">Criar</button>
                </form>
                <div class="hint">Opcional para cartão: informe um link de checkout no campo abaixo.</div>
                <input type="url" id="cardCheckoutUrl" placeholder="https://... (Link de pagamento por cartão)" style="margin-top:10px;width:100%;">
                <p class="msg" id="statusMsg"></p>
            </section>

            <section class="card">
                <h2 style="margin: 0 0 12px;">Links gerados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th>Provedor</th>
                            <th>Status</th>
                            <th>Link</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tbLinks"></tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const form = document.getElementById('formPagamento');
        const tbLinks = document.getElementById('tbLinks');
        const statusMsg = document.getElementById('statusMsg');
        const providerEl = document.getElementById('provider');
        const pixKeyEl = document.getElementById('pixKey');
        const cardCheckoutEl = document.getElementById('cardCheckoutUrl');

        // Mantem preferencia local para facilitar criacao de novos links
        const prefPixKey = localStorage.getItem('ldfp_pref_pix_key') || '';
        const prefCardUrl = localStorage.getItem('ldfp_pref_card_checkout_url') || '';
        if (prefPixKey) pixKeyEl.value = prefPixKey;
        if (prefCardUrl) cardCheckoutEl.value = prefCardUrl;

        function formatCurrency(value) {
            return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function setStatus(message, error) {
            statusMsg.className = error ? 'msg error' : 'msg';
            statusMsg.textContent = message || '';
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function providerLabel(value) {
            return value === 'cartao' ? 'cartao' : 'pix';
        }

        function toggleProviderFields() {
            const provider = providerEl.value;
            pixKeyEl.style.display = provider === 'pix' ? '' : 'none';
            cardCheckoutEl.style.display = provider === 'cartao' ? '' : 'none';
        }

        async function loadLinks() {
            const response = await fetch('/pagamentos/links');
            const data = await response.json().catch(() => []);
            if (!response.ok) {
                throw new Error(data.error || 'Nao foi possivel carregar links.');
            }

            tbLinks.innerHTML = (data || []).map((item) => `
                <tr>
                    <td>${escapeHtml(item.descricao)}</td>
                    <td>${formatCurrency(item.valor)}</td>
                    <td>${providerLabel(item.payment_method || item.provider)}</td>
                    <td><span class="status ${item.status}">${(item.status || '').replace('_', ' ')}</span></td>
                    <td><a href="${item.url}" target="_blank" rel="noreferrer">Abrir</a></td>
                    <td>
                        <div class="row-actions">
                            <button class="btn secondary" onclick="copiarLink('${escapeHtml(item.url)}')">Copiar link</button>
                            ${item.status === 'aguardando_confirmacao' ? `<button class="btn" onclick="marcarPago(${item.id})">Confirmar pago</button>` : ''}
                            ${item.status === 'pendente' ? `<span style="font-size:12px;color:#64748b;">Aguardando cliente pagar</span>` : ''}
                            ${item.status === 'pago' ? `<span style="font-size:12px;color:#166534;">Pagamento confirmado</span>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function marcarPago(id) {
            try {
                const response = await fetch(`/pagamentos/links/${id}/pago`, { method: 'PUT' });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Nao foi possivel marcar pagamento.');
                }
                setStatus('Pagamento marcado como pago.');
                await loadLinks();
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function copiarLink(url) {
            try {
                await navigator.clipboard.writeText(url);
                setStatus('Link copiado para a area de transferencia.');
            } catch (_error) {
                setStatus('Nao foi possivel copiar o link.', true);
            }
        }

        window.marcarPago = marcarPago;
        window.copiarLink = copiarLink;

        providerEl.addEventListener('change', toggleProviderFields);
        toggleProviderFields();

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setStatus('');

            try {
                const response = await fetch('/pagamentos/links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        descricao: document.getElementById('descricao').value.trim(),
                        valor: Number(document.getElementById('valor').value),
                        provider: providerEl.value,
                        pixKey: pixKeyEl.value.trim() || null,
                        cardCheckoutUrl: cardCheckoutEl.value.trim() || null
                    })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Nao foi possivel criar link de pagamento.');
                }

                if (providerEl.value === 'pix' && pixKeyEl.value.trim()) {
                    localStorage.setItem('ldfp_pref_pix_key', pixKeyEl.value.trim());
                }
                if (providerEl.value === 'cartao' && cardCheckoutEl.value.trim()) {
                    localStorage.setItem('ldfp_pref_card_checkout_url', cardCheckoutEl.value.trim());
                }

                setStatus(`Link criado com sucesso. Compartilhe: ${data.url}`);
                form.reset();
                if (providerEl.value === 'pix') {
                    pixKeyEl.value = localStorage.getItem('ldfp_pref_pix_key') || '';
                }
                if (providerEl.value === 'cartao') {
                    cardCheckoutEl.value = localStorage.getItem('ldfp_pref_card_checkout_url') || '';
                }
                toggleProviderFields();
                await loadLinks();
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        loadLinks().catch((error) => setStatus(error.message, true));
    </script>
</body>
</html>
