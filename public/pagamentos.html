<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos da Igreja</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 20px 14px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.1);
            padding: 14px;
            margin-bottom: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
        }

        input, select {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .btn {
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid #e2e8f0;
            padding: 10px;
            font-size: 13px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            color: #475569;
            text-transform: uppercase;
            font-size: 11px;
        }

        .status {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .status.pendente {
            background: #fef3c7;
            color: #854d0e;
        }

        .status.pago {
            background: #dcfce7;
            color: #166534;
        }

        .msg {
            font-size: 13px;
            color: #0f766e;
        }

        .msg.error {
            color: #b91c1c;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Pagamentos" data-shell-breadcrumb="LDFP / Tesouraria / Pagamentos" data-shell-active="pagamentos.html" data-shell-chip="Ambiente autenticado" data-shell-role="Financeiro">
    <main class="main-content enterprise-main">
        <div class="wrap">
            <section class="card">
                <h2 style="margin: 0 0 12px;">Criar link de pagamento</h2>
                <form id="formPagamento" class="grid">
                    <input type="text" id="descricao" placeholder="Descrição" required>
                    <input type="number" id="valor" step="0.01" min="0" placeholder="Valor" required>
                    <select id="provider">
                        <option value="mock_pix">PIX</option>
                        <option value="mock_cartao">Cartão</option>
                    </select>
                    <button class="btn" type="submit">Criar</button>
                </form>
                <p class="msg" id="statusMsg"></p>
            </section>

            <section class="card">
                <h2 style="margin: 0 0 12px;">Links gerados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th>Provedor</th>
                            <th>Status</th>
                            <th>Link</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tbLinks"></tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const form = document.getElementById('formPagamento');
        const tbLinks = document.getElementById('tbLinks');
        const statusMsg = document.getElementById('statusMsg');

        function formatCurrency(value) {
            return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function setStatus(message, error) {
            statusMsg.className = error ? 'msg error' : 'msg';
            statusMsg.textContent = message || '';
        }

        async function loadLinks() {
            const response = await fetch('/pagamentos/links');
            const data = await response.json().catch(() => []);
            if (!response.ok) {
                throw new Error(data.error || 'Nao foi possivel carregar links.');
            }

            tbLinks.innerHTML = (data || []).map((item) => `
                <tr>
                    <td>${item.descricao}</td>
                    <td>${formatCurrency(item.valor)}</td>
                    <td>${item.provider}</td>
                    <td><span class="status ${item.status}">${item.status}</span></td>
                    <td><a href="${item.url}" target="_blank" rel="noreferrer">Abrir</a></td>
                    <td>${item.status === 'pendente' ? `<button class="btn" onclick="marcarPago(${item.id})">Marcar pago</button>` : '-'}</td>
                </tr>
            `).join('');
        }

        async function marcarPago(id) {
            try {
                const response = await fetch(`/pagamentos/links/${id}/pago`, { method: 'PUT' });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Nao foi possivel marcar pagamento.');
                }
                setStatus('Pagamento marcado como pago.');
                await loadLinks();
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        window.marcarPago = marcarPago;

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setStatus('');

            try {
                const response = await fetch('/pagamentos/links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        descricao: document.getElementById('descricao').value.trim(),
                        valor: Number(document.getElementById('valor').value),
                        provider: document.getElementById('provider').value
                    })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Nao foi possivel criar link de pagamento.');
                }

                setStatus(`Link criado: ${data.url}`);
                form.reset();
                await loadLinks();
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        loadLinks().catch((error) => setStatus(error.message, true));
    </script>
</body>
</html>
