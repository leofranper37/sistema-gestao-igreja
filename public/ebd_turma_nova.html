<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Nova Turma EBD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap { padding: 24px 30px 30px; }
        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            max-width: 900px;
        }
        .form-head {
            padding: 12px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }
        .form-body { padding: 16px; display: grid; gap: 12px; }
        .section {
            background: #ffffff;
            border: 1px solid #e9edf4;
            border-radius: 8px;
            padding: 10px;
        }
        .section-title {
            margin: 0 0 10px;
            font-size: 12px;
            font-weight: 700;
            color: #92400e;
            border-bottom: 1px solid #fcd34d;
            padding-bottom: 6px;
            text-transform: uppercase;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label {
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .field input, .field select {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            background: #fff;
        }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
        }
        .btn-ghost {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px 14px;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
        }
        .status { font-size: 12px; font-weight: 600; color: #92400e; }
        .status.error { color: #b91c1c; }
        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Nova Turma" data-shell-breadcrumb="LDFP / Secretaria / EBD / Turmas / Nova Turma" data-shell-active="ebd_turmas.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="form-card">
                <div class="form-head" id="formHead">Nova Turma</div>
                <form id="classForm" class="form-body">
                    <div class="section">
                        <h3 class="section-title">Dados da Turma</h3>
                        <div class="grid-3">
                            <div class="field">
                                <label for="nomeTurma">Nome da Turma</label>
                                <input type="text" id="nomeTurma" placeholder="Nome da turma" required>
                            </div>
                            <div class="field">
                                <label for="anoTurma">Ano</label>
                                <input type="number" id="anoTurma" min="2000" max="2100" placeholder="Ano">
                            </div>
                            <div class="field">
                                <label for="estagioTurma">Estagio</label>
                                <select id="estagioTurma">
                                    <option value="">Selecione...</option>
                                    <option value="Novo Convertido">Novo Convertido</option>
                                    <option value="Intermediario">Intermediario</option>
                                    <option value="Avancado">Avancado</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">Professores</h3>
                        <div class="grid-2">
                            <div class="field">
                                <label for="professorTurma">Professor</label>
                                <input type="text" id="professorTurma" placeholder="Nome do professor">
                            </div>
                            <div class="field">
                                <label for="segundoProfessorTurma">Segundo Professor</label>
                                <input type="text" id="segundoProfessorTurma" placeholder="Nome do segundo professor">
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn-primary" type="submit" id="btnSalvar">Salvar</button>
                        <button class="btn-ghost" type="button" id="btnVoltar">Voltar</button>
                        <span class="status" id="statusMsg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const STORAGE_KEY = 'ldfpEbdClasses';
        const form = document.getElementById('classForm');
        const statusMsg = document.getElementById('statusMsg');
        const formHead = document.getElementById('formHead');
        const btnSalvar = document.getElementById('btnSalvar');

        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        function readClasses() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function writeClasses(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return String(Date.now());
        }

        function loadEditData() {
            if (!editingId) return;

            const item = readClasses().find((entry) => String(entry.id) === String(editingId));
            if (!item) {
                statusMsg.textContent = 'Turma nao encontrada para edicao.';
                statusMsg.classList.add('error');
                return;
            }

            document.getElementById('nomeTurma').value = item.nomeTurma || '';
            document.getElementById('anoTurma').value = item.ano || '';
            document.getElementById('estagioTurma').value = item.estagio || '';
            document.getElementById('professorTurma').value = item.professor || '';
            document.getElementById('segundoProfessorTurma').value = item.segundoProfessor || '';

            formHead.textContent = 'Editar Turma';
            btnSalvar.textContent = 'Atualizar';
        }

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'ebd_turmas.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const nomeTurma = document.getElementById('nomeTurma').value.trim();
            const ano = document.getElementById('anoTurma').value.trim();
            const estagio = document.getElementById('estagioTurma').value.trim();
            const professor = document.getElementById('professorTurma').value.trim();
            const segundoProfessor = document.getElementById('segundoProfessorTurma').value.trim();

            if (!nomeTurma) {
                statusMsg.textContent = 'Informe o nome da turma.';
                statusMsg.classList.add('error');
                return;
            }

            const classes = readClasses();

            if (editingId) {
                const index = classes.findIndex((entry) => String(entry.id) === String(editingId));
                if (index >= 0) {
                    classes[index] = {
                        ...classes[index],
                        nomeTurma,
                        ano,
                        estagio,
                        professor,
                        segundoProfessor,
                        updatedAt: new Date().toISOString()
                    };
                }
                statusMsg.textContent = 'Turma atualizada com sucesso!';
            } else {
                classes.push({
                    id: makeId(),
                    nomeTurma,
                    ano,
                    estagio,
                    professor,
                    segundoProfessor,
                    createdAt: new Date().toISOString()
                });
                statusMsg.textContent = 'Turma salva com sucesso!';
                form.reset();
            }

            statusMsg.classList.remove('error');
            writeClasses(classes);
        });

        loadEditData();
    </script>
</body>
</html>
