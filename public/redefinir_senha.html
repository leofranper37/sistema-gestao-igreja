<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir senha - LDFP</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #e5e7eb; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo img { height: 80px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .form-group input:focus { border-color: #f59e0b; outline: none; }
        .btn { background-color: #f59e0b; color: #111; width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:hover { background-color: #d97706; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .msg { margin-top: 14px; font-size: 13px; text-align: left; padding: 10px 12px; border-radius: 4px; display: none; }
        .msg.erro { background: #fee2e2; color: #b91c1c; display: block; }
        .msg.ok { background: #dcfce7; color: #15803d; display: block; }
        .hint { font-size: 12px; color: #999; margin-top: 4px; }
        .back-link { margin-top: 22px; font-size: 13px; }
        .back-link a { color: #f59e0b; text-decoration: none; font-weight: bold; }
        #tokenInvalido { display: none; }
        #formRedefinir { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="logo.png" alt="LDFP" onerror="this.style.display='none'">
        </div>

        <!-- Estado: token inválido/expirado -->
        <div id="tokenInvalido">
            <h2 style="color:#b91c1c;font-size:18px;">Link inválido ou expirado</h2>
            <p style="color:#666;font-size:13px;">Solicite um novo link de recuperação de senha.</p>
            <a href="esqueci_senha.html" class="btn" style="display:inline-block;margin-top:8px;text-decoration:none;">Solicitar novo link</a>
        </div>

        <!-- Estado: formulário de nova senha -->
        <div id="formRedefinir">
            <h2 style="margin-bottom:6px;font-size:20px;">Criar nova senha</h2>
            <p style="color:#666;font-size:13px;margin-bottom:24px;">Informe sua nova senha abaixo.</p>

            <form onsubmit="return false;">
                <div class="form-group">
                    <label>Nova senha</label>
                    <input type="password" id="senha" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                    <div class="hint">Mínimo 8 caracteres</div>
                </div>
                <div class="form-group">
                    <label>Confirmar nova senha</label>
                    <input type="password" id="confirmar" placeholder="Repita a nova senha" autocomplete="new-password">
                </div>
                <button type="button" class="btn" id="btnSalvar" onclick="salvar()">Salvar nova senha</button>
            </form>

            <div id="msg" class="msg"></div>
        </div>

        <div class="back-link">
            <a href="login.html">← Voltar ao login</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token || token.length < 10) {
            document.getElementById('tokenInvalido').style.display = 'block';
        } else {
            document.getElementById('formRedefinir').style.display = 'block';
        }

        async function salvar() {
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;
            const msgEl = document.getElementById('msg');
            const btn = document.getElementById('btnSalvar');

            msgEl.className = 'msg';
            msgEl.textContent = '';

            if (!senha || senha.length < 8) {
                msgEl.className = 'msg erro';
                msgEl.textContent = 'A senha deve ter pelo menos 8 caracteres.';
                return;
            }
            if (senha !== confirmar) {
                msgEl.className = 'msg erro';
                msgEl.textContent = 'As senhas não conferem.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const resp = await fetch('/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, senha })
                });

                const data = await resp.json().catch(() => ({}));

                if (!resp.ok) {
                    msgEl.className = 'msg erro';
                    msgEl.textContent = data.error || 'Erro ao redefinir a senha.';
                    if (resp.status === 400 && (data.error || '').toLowerCase().includes('expirado')) {
                        document.getElementById('formRedefinir').style.display = 'none';
                        document.getElementById('tokenInvalido').style.display = 'block';
                    }
                    return;
                }

                msgEl.className = 'msg ok';
                msgEl.textContent = data.message || 'Senha redefinida com sucesso!';
                document.getElementById('senha').value = '';
                document.getElementById('confirmar').value = '';

                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } catch (err) {
                msgEl.className = 'msg erro';
                msgEl.textContent = 'Erro de conexão. Tente novamente.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar nova senha';
            }
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Enter') salvar(); });
    </script>
    <script src="speed-insights.js" defer></script>
</body>
</html>
