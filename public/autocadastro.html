<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocadastro de Membro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #134e4a, #0f172a 60%);
            color: #e2e8f0;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            width: min(720px, 96vw);
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
            overflow: hidden;
        }

        .hero {
            padding: 22px 24px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            background: linear-gradient(90deg, rgba(20, 184, 166, 0.2), rgba(2, 132, 199, 0.15));
        }

        .hero h1 {
            margin: 0;
            font-size: 1.35rem;
        }

        .hero p {
            margin: 8px 0 0;
            color: #cbd5e1;
            font-size: 0.92rem;
        }

        form {
            padding: 22px 24px 24px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #93c5fd;
            font-weight: 700;
        }

        input,
        textarea {
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .actions {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 6px;
        }

        .status {
            font-size: 13px;
            color: #67e8f9;
        }

        .status.error {
            color: #fda4af;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
            color: #082f49;
            background: linear-gradient(90deg, #2dd4bf, #38bdf8);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @media (max-width: 700px) {
            form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="card">
        <header class="hero">
            <h1><i class="fa-solid fa-user-plus"></i> Autocadastro de Membro</h1>
            <p>Preencha seus dados. A secretaria vai analisar e aprovar seu acesso.</p>
        </header>

        <form id="formAutocadastro">
            <div class="field">
                <label for="igrejaNome">Nome da Igreja</label>
                <input type="text" id="igrejaNome" name="igrejaNome" placeholder="Ex: Assembleia Sede" required>
            </div>

            <div class="field">
                <label for="nome">Seu Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Joao Silva" required>
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="voce@email.com">
            </div>

            <div class="field">
                <label for="telefone">Telefone/WhatsApp</label>
                <input type="text" id="telefone" name="telefone" placeholder="(11) 99999-0000">
            </div>

            <div class="field">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" placeholder="Ex: Angra dos Reis">
            </div>

            <div class="field">
                <label for="ministerioInteresse">Interesse ministerial</label>
                <input type="text" id="ministerioInteresse" name="ministerioInteresse" placeholder="Ex: Midia, Louvor, Recepcao">
            </div>

            <div class="field full">
                <label for="observacao">Observacao</label>
                <textarea id="observacao" name="observacao" placeholder="Conte brevemente como deseja servir."></textarea>
            </div>

            <div class="actions">
                <span class="status" id="statusMsg"></span>
                <button type="submit" class="btn" id="btnEnviar">Enviar para aprovacao</button>
            </div>
        </form>
    </section>

    <script>
        const form = document.getElementById('formAutocadastro');
        const statusMsg = document.getElementById('statusMsg');
        const btnEnviar = document.getElementById('btnEnviar');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            statusMsg.classList.remove('error');
            statusMsg.textContent = '';
            btnEnviar.disabled = true;
            btnEnviar.textContent = 'Enviando...';

            const payload = {
                igrejaNome: form.igrejaNome.value.trim(),
                nome: form.nome.value.trim(),
                email: form.email.value.trim(),
                telefone: form.telefone.value.trim(),
                cidade: form.cidade.value.trim(),
                ministerioInteresse: form.ministerioInteresse.value.trim(),
                observacao: form.observacao.value.trim()
            };

            try {
                const response = await fetch('/autocadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.error || data.message || 'Nao foi possivel enviar seu autocadastro.');
                }

                form.reset();
                statusMsg.textContent = 'Cadastro enviado com sucesso. Aguarde a aprovacao da secretaria.';
            } catch (error) {
                statusMsg.classList.add('error');
                statusMsg.textContent = error.message || 'Erro inesperado ao enviar cadastro.';
            } finally {
                btnEnviar.disabled = false;
                btnEnviar.textContent = 'Enviar para aprovacao';
            }
        });
    </script>
</body>
</html>
