<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Novo Batismo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap { padding: 24px 30px 30px; }
        .form-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06); overflow: hidden; max-width: 900px; }
        .form-head { padding: 12px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 14px; font-weight: 700; color: #0f172a; }
        .form-body { padding: 16px; display: grid; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .field input, .field select { border: 1px solid #dbe3ef; border-radius: 8px; padding: 10px; font-size: 14px; background: #fff; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-primary { border: none; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%); }
        .btn-ghost { border: 1px solid #dbe3ef; border-radius: 8px; padding: 10px 14px; color: #475569; font-size: 12px; font-weight: 700; cursor: pointer; background: #fff; }
        .status { font-size: 12px; font-weight: 600; color: #92400e; }
        .status.error { color: #b91c1c; }
        @media (max-width: 900px) {
            .grid-4 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Cadastrar Batismo" data-shell-breadcrumb="LDFP / Secretaria / Batismos / Cadastrar" data-shell-active="batismos.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="form-card">
                <div class="form-head" id="formHead">Cadastrar Batismo</div>
                <form id="baptismForm" class="form-body">
                    <div class="grid-4">
                        <div class="field">
                            <label for="descricaoBatismo">Descrição</label>
                            <input type="text" id="descricaoBatismo" placeholder="Descrição" required>
                        </div>
                        <div class="field">
                            <label for="localBatismo">Local Batismo</label>
                            <input type="text" id="localBatismo" placeholder="Local">
                        </div>
                        <div class="field">
                            <label for="dataBatismo">Data Batismo</label>
                            <input type="date" id="dataBatismo" required>
                        </div>
                        <div class="field">
                            <label for="encerradoBatismo">Encerrado</label>
                            <select id="encerradoBatismo">
                                <option value="Não">Não</option>
                                <option value="Sim">Sim</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label for="pastorBatismo">Pastor</label>
                        <input type="text" id="pastorBatismo" placeholder="Pastor responsável">
                    </div>

                    <div class="actions">
                        <button class="btn-primary" type="submit" id="btnSalvar">Salvar</button>
                        <button class="btn-ghost" type="button" id="btnVoltar">Voltar</button>
                        <span class="status" id="statusMsg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const STORAGE_KEY = 'ldfpBaptisms';
        const form = document.getElementById('baptismForm');
        const statusMsg = document.getElementById('statusMsg');
        const formHead = document.getElementById('formHead');
        const btnSalvar = document.getElementById('btnSalvar');

        const params = new URLSearchParams(window.location.search);
        const editingId = params.get('edit');

        function readBaptisms() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function writeBaptisms(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return String(Date.now());
        }

        function loadEditData() {
            if (!editingId) return;

            const item = readBaptisms().find((entry) => String(entry.id) === String(editingId));
            if (!item) {
                statusMsg.textContent = 'Batismo nao encontrado para edicao.';
                statusMsg.classList.add('error');
                return;
            }

            document.getElementById('descricaoBatismo').value = item.descricao || '';
            document.getElementById('localBatismo').value = item.localBatismo || '';
            document.getElementById('dataBatismo').value = item.dataBatismo || '';
            document.getElementById('encerradoBatismo').value = item.encerrado || 'Não';
            document.getElementById('pastorBatismo').value = item.pastor || '';

            formHead.textContent = 'Editar Batismo';
            btnSalvar.textContent = 'Atualizar';
        }

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'batismos.html';
        });

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const descricao = document.getElementById('descricaoBatismo').value.trim();
            const localBatismo = document.getElementById('localBatismo').value.trim();
            const dataBatismo = document.getElementById('dataBatismo').value;
            const encerrado = document.getElementById('encerradoBatismo').value;
            const pastor = document.getElementById('pastorBatismo').value.trim();

            if (!descricao || !dataBatismo) {
                statusMsg.textContent = 'Informe Descrição e Data.';
                statusMsg.classList.add('error');
                return;
            }

            const list = readBaptisms();

            if (editingId) {
                const index = list.findIndex((entry) => String(entry.id) === String(editingId));
                if (index >= 0) {
                    list[index] = {
                        ...list[index],
                        descricao,
                        localBatismo,
                        dataBatismo,
                        encerrado,
                        pastor,
                        updatedAt: new Date().toISOString()
                    };
                }
                statusMsg.textContent = 'Batismo atualizado com sucesso!';
            } else {
                list.push({
                    id: makeId(),
                    descricao,
                    localBatismo,
                    dataBatismo,
                    encerrado,
                    pastor,
                    createdAt: new Date().toISOString()
                });
                statusMsg.textContent = 'Batismo salvo com sucesso!';
                form.reset();
            }

            statusMsg.classList.remove('error');
            writeBaptisms(list);
        });

        document.getElementById('dataBatismo').value = new Date().toISOString().slice(0, 10);
        loadEditData();
    </script>
</body>
</html>
