<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zeke - Cadastro de Membros</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ESTILOS ESPECIFICOS DO CADASTRO */
        .form-container {
            background: white; border: 1px solid #e5e7eb; border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); min-height: 600px; padding-bottom: 20px;
        }

        /* SISTEMA DE ABAS (TABS) */
        .tabs-header {
            display: flex; border-bottom: 1px solid #eee; background: #fff;
            padding: 0 20px; border-radius: 8px 8px 0 0; margin-bottom: 20px;
        }
        .tab-btn {
            background: none; border: none; padding: 15px 20px;
            font-size: 13px; font-weight: 600; color: #6b7280; cursor: pointer;
            border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn:hover { color: #1f2937; }
        .tab-btn.active { color: #111; border-bottom-color: #00bef0; }

        /* CONTEUDO DAS ABAS */
        .tab-content { display: none; padding: 0 30px; }
        .tab-content.active { display: block; }

        /* GRID DO FORMULARIO */
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 5px; }
        
        input[type="text"], input[type="date"], input[type="email"], select, textarea {
            padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 13px; color: #374151; outline: none; width: 100%; box-sizing: border-box; background: #fff;
        }
        input:focus, select:focus, textarea:focus { border-color: #00bef0; }

        /* BOTAO SALVAR VERDE */
        .btn-salvar {
            background-color: #28a745; color: white; border: none; padding: 8px 20px;
            border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 13px;
        }
        .btn-salvar:hover { background-color: #218838; }

        /* Estilos Especiais */
        .search-input-group { position: relative; }
        .search-input-group i { position: absolute; right: 10px; top: 10px; color: #999; cursor: pointer; }

        /* Aviso Azul (Ministeriais) */
        .info-box-blue {
            background-color: #00bef0; color: white; padding: 15px; border-radius: 4px;
            font-size: 12px; line-height: 1.5;
        }

        /* Botoes da Foto */
        .photo-btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-photo {
            padding: 5px 10px; border: 1px solid #ccc; background: #eee; border-radius: 3px;
            cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px;
        }
        .btn-photo.orange { background: #f0ad4e; color: white; border: none; }
        .btn-photo.green { background: #5cb85c; color: white; border: none; }
        
        .photo-canvas {
            border: 1px solid #ddd; height: 300px; background: #fafafa; border-radius: 4px;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Ficha de Cadastro" data-shell-breadcrumb="LDFP / Secretaria / Membros / Cadastro" data-shell-active="cadastro.html">

    <script>
        // LOGICA DAS ABAS (TABS)
        function abrirAba(evt, nomeAba) {
            evt.preventDefault();
            
            var conteudos = document.getElementsByClassName("tab-content");
            for (var i = 0; i < conteudos.length; i++) {
                conteudos[i].style.display = "none";
            }

            var botoes = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < botoes.length; i++) {
                botoes[i].className = botoes[i].className.replace(" active", "");
            }

            document.getElementById(nomeAba).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
