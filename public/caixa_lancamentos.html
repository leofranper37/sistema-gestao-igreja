<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Lançamentos do Caixa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .lancamentos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card-bloco {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 16px;
        }

        .card-bloco h2 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .field {
            margin-bottom: 10px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .saldo-valor {
            margin-top: 6px;
            font-size: 34px;
            font-weight: 800;
            color: #15803d;
        }

        .saldo-valor.negativo {
            color: #b91c1c;
        }

        .status-msg {
            font-size: 13px;
            margin-top: 10px;
            color: #065f46;
        }

        .status-msg.error {
            color: #b91c1c;
        }

        @media (max-width: 900px) {
            .lancamentos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="theme-petroleo enterprise-shell-page" data-shell-title="Lançamentos do Caixa" data-shell-breadcrumb="LDFP / Tesouraria / Caixa / Lançamentos" data-shell-active="caixa_lancamentos.html" data-shell-chip="Tesouraria ativa" data-shell-role="Admin">
    <main class="main-content enterprise-main">
        <div class="enterprise-page-shell">
            <div class="enterprise-page-hero">
                <div>
                    <h2>Lançamentos do Caixa</h2>
                    <p>Registre entradas e saídas com histórico consolidado e atualização imediata do saldo.</p>
                </div>
                <div class="enterprise-page-badge"><i class="fa-solid fa-cash-register"></i> Caixa</div>
            </div>

            <div class="lancamentos-grid">
                <section class="card-bloco">
                    <h2>Saldo Atual</h2>
                    <div class="saldo-valor" id="saldoAtual">R$ 0,00</div>
                </section>

                <section class="card-bloco">
                    <h2>Novo Lançamento</h2>
                    <form id="formLancamento">
                        <div class="field">
                            <label for="desc">Descrição</label>
                            <input id="desc" type="text" placeholder="Ex: Oferta culto domingo" required>
                        </div>
                        <div class="field">
                            <label for="valor">Valor</label>
                            <input id="valor" type="text" placeholder="0,00" required>
                        </div>
                        <div class="field">
                            <label for="tipo">Tipo</label>
                            <select id="tipo" required>
                                <option value="entrada">Entrada (+)</option>
                                <option value="saida">Saída (-)</option>
                            </select>
                        </div>
                        <button class="btn-primario" type="submit">Registrar</button>
                        <div class="status-msg" id="statusMsg"></div>
                    </form>
                </section>
            </div>

            <section class="tabela-card">
                <div class="tabela-topo">
                    <h2>Histórico</h2>
                    <div class="tabela-topo-acoes">
                        <input id="buscaRapida" type="text" placeholder="Pesquisar descrição...">
                        <button class="btn-linha" type="button" id="btnRecarregar"><i class="fa-solid fa-rotate-right"></i> Recarregar</button>
                    </div>
                </div>
                <div class="tabela-wrapper">
                    <table class="tabela-lista">
                        <thead>
                            <tr>
                                <th>Descrição</th>
                                <th>Tipo</th>
                                <th>Valor</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela"></tbody>
                    </table>
                    <div class="tabela-vazia" id="estadoVazio">Nenhum lançamento encontrado.</div>
                </div>
            </section>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const saldoAtualEl = document.getElementById('saldoAtual');
        const form = document.getElementById('formLancamento');
        const statusMsg = document.getElementById('statusMsg');
        const corpoTabela = document.getElementById('corpoTabela');
        const estadoVazio = document.getElementById('estadoVazio');
        const buscaRapida = document.getElementById('buscaRapida');

        const formatCurrency = (value) => {
            const number = Number(value || 0);
            return number.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const parseCurrency = (value) => {
            const normalized = String(value || '').replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, '');
            return Number(normalized);
        };

        document.getElementById('valor').addEventListener('input', (e) => {
            const digits = e.target.value.replace(/\D/g, '');
            const amount = Number(digits || 0) / 100;
            e.target.value = formatCurrency(amount);
        });

        let transacoes = [];

        const renderTabela = (lista) => {
            corpoTabela.innerHTML = '';
            if (!lista.length) {
                estadoVazio.style.display = 'block';
                return;
            }

            estadoVazio.style.display = 'none';
            corpoTabela.innerHTML = lista.map((t) => {
                const isEntrada = t.type === 'entrada';
                const classe = isEntrada ? 'entrada' : 'saida';
                const sinal = isEntrada ? '+' : '-';
                const data = new Date(t.created_at).toLocaleDateString('pt-BR');
                return `
                    <tr>
                        <td>${t.description}</td>
                        <td class="${classe}">${isEntrada ? 'ENTRADA' : 'SAÍDA'}</td>
                        <td class="${classe}">${sinal} R$ ${formatCurrency(t.amount)}</td>
                        <td>${data}</td>
                    </tr>
                `;
            }).join('');
        };

        async function carregarSaldo() {
            try {
                const resp = await fetch('/saldo');
                const data = await resp.json();
                const valor = parseCurrency(data.saldo || '0');
                saldoAtualEl.textContent = `R$ ${formatCurrency(valor)}`;
                saldoAtualEl.classList.toggle('negativo', valor < 0);
            } catch {
                saldoAtualEl.textContent = 'R$ 0,00';
            }
        }

        async function carregarTransacoes() {
            try {
                const resp = await fetch('/transacoes');
                const data = await resp.json();
                transacoes = Array.isArray(data) ? data : [];
                aplicarFiltroRapido();
            } catch {
                transacoes = [];
                renderTabela([]);
            }
        }

        function aplicarFiltroRapido() {
            const termo = buscaRapida.value.trim().toLowerCase();
            const lista = termo
                ? transacoes.filter((t) => (t.description || '').toLowerCase().includes(termo))
                : transacoes;
            renderTabela(lista);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const descricao = document.getElementById('desc').value.trim();
            const valor = document.getElementById('valor').value.trim();
            const tipo = document.getElementById('tipo').value;

            if (!descricao || !valor) {
                statusMsg.textContent = 'Preencha descrição e valor.';
                statusMsg.classList.add('error');
                return;
            }

            try {
                const resp = await fetch('/transacoes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ descricao, valor, tipo })
                });

                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.error || 'Não foi possível registrar.');
                }

                statusMsg.textContent = 'Lançamento registrado com sucesso.';
                statusMsg.classList.remove('error');
                form.reset();
                await carregarSaldo();
                await carregarTransacoes();
            } catch (err) {
                statusMsg.textContent = err.message;
                statusMsg.classList.add('error');
            }
        });

        buscaRapida.addEventListener('input', aplicarFiltroRapido);
        document.getElementById('btnRecarregar').addEventListener('click', async () => {
            await carregarSaldo();
            await carregarTransacoes();
        });

        carregarSaldo();
        carregarTransacoes();
    </script>
</body>
</html>
