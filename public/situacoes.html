<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Situações</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap {
            padding: 24px 30px 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #dbe3ef;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
        }

        .table-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eef2f7;
            font-size: 13px;
            color: #334155;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Situações" data-shell-breadcrumb="LDFP / Secretaria / Situações" data-shell-active="situacoes.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="page-header">
                <div>
                    <h2 style="margin:0;color:#0f172a;">Situações</h2>
                    <small class="muted">Secretaria / Membros</small>
                </div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar...">
                </div>
            </div>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Envia Carta de Aniversário</th>
                            <th>Saída Definitiva</th>
                            <th>Consta Rel. Aniversariantes</th>
                        </tr>
                    </thead>
                    <tbody id="situacoesBody">
                        <tr><td>Ativo</td><td>Não</td><td>Não</td><td>Sim</td></tr>
                        <tr><td>Inativo</td><td>Não</td><td>Não</td><td>Não</td></tr>
                        <tr><td>Falecido</td><td>Não</td><td>Sim</td><td>Não</td></tr>
                        <tr><td>Mudou de Ministério</td><td>Não</td><td>Sim</td><td>Não</td></tr>
                        <tr><td>Disciplinado</td><td>Não</td><td>Não</td><td>Não</td></tr>
                        <tr><td>Desviado</td><td>Não</td><td>Não</td><td>Não</td></tr>
                        <tr><td>Removido LGPD</td><td>Não</td><td>Sim</td><td>Não</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const searchInput = document.getElementById('searchInput');
        const situacoesBody = document.getElementById('situacoesBody');
        const rows = Array.from(situacoesBody.querySelectorAll('tr'));

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim().toLowerCase();
            rows.forEach((row) => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
