<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado — LDFP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 20px; padding: 50px 40px; max-width: 460px;
            width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .icon-wrap { width: 80px; height: 80px; border-radius: 50%; background: rgba(34,197,94,.12);
            border: 2px solid rgba(34,197,94,.3); display: inline-flex; align-items: center;
            justify-content: center; font-size: 36px; color: #22c55e; margin-bottom: 28px;
            animation: pop .5s ease; }
        @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
        .btn { display: block; background: linear-gradient(135deg, #f59e0b, #d97706); color: #111;
            font-weight: 800; font-size: 16px; padding: 16px; border-radius: 12px; text-decoration: none; }
        .redirect-msg { font-size: 13px; color: #64748b; margin-top: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">✓</div>
        <h1>Pagamento Confirmado!</h1>
        <p>Sua assinatura foi ativada com sucesso. Bem-vindo ao LDFP — agora com acesso completo ao seu plano.</p>
        <a href="dashboard.html" class="btn">Ir para o Painel</a>
        <p class="redirect-msg" id="redirectMsg">Redirecionando em <span id="countdown">5</span>s...</p>
    </div>
    <script>
        let n = 5;
        const el = document.getElementById('countdown');
        const interval = setInterval(() => {
            n--;
            if (el) el.textContent = n;
            if (n <= 0) { clearInterval(interval); window.location.href = 'dashboard.html'; }
        }, 1000);
    </script>
</body>
</html>
