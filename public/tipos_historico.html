<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDFP - Tipos de Historico Pastoral</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap {
            padding: 24px 30px 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            border: none;
            border-radius: 8px;
            padding: 9px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #0ea5e9 0%, #10b981 100%);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #dbe3ef;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
        }

        .table-card,
        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        .bar-title {
            padding: 10px 14px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eef2f7;
            font-size: 13px;
            color: #334155;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        .muted {
            color: #94a3b8;
        }

        .form-card {
            display: none;
        }

        .form-card.is-visible {
            display: block;
        }

        .form-content {
            padding: 16px;
        }

        .f {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 480px;
        }

        .f label {
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .f input {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-ghost {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 700;
            background: #fff;
            color: #475569;
            cursor: pointer;
        }

        .status {
            color: #047857;
            font-size: 12px;
            font-weight: 600;
        }

        .status.error {
            color: #b91c1c;
        }
    </style>
</head>
<body class="theme-petroleo" data-shell-title="Tipos de Historico Pastoral" data-shell-breadcrumb="LDFP / Secretaria / Historico Pastoral / Tipos de Historico" data-shell-active="tipos_historico.html" data-shell-chip="Ambiente autenticado" data-shell-role="Administrador">
    <main class="main-content enterprise-main">
        <div class="page-wrap">
            <div class="page-header">
                <div>
                    <h2 style="margin:0;color:#0f172a;">Tipos de Historico Pastoral <small class="muted" id="modeLabel"></small></h2>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <div class="search-box" id="searchWrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Pesquisar...">
                    </div>
                    <button class="btn-primary" type="button" id="btnNovoTipo">
                        <i class="fa-solid fa-plus"></i> Novo Tipo
                    </button>
                </div>
            </div>

            <div class="table-card" id="listCard">
                <div class="bar-title">Tipos de Historico Pastoral</div>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                        </tr>
                    </thead>
                    <tbody id="typesBody">
                        <tr><td>Transferencia de Membro</td></tr>
                        <tr><td>Reconducao de Funcao</td></tr>
                        <tr><td>Afastamento Pastoral</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="form-card" id="formCard">
                <div class="bar-title">Cadastro</div>
                <div class="form-content">
                    <form id="tipoForm">
                        <div class="f">
                            <label for="tipoNome">Nome</label>
                            <input type="text" id="tipoNome" placeholder="Nome do tipo de historico" required>
                        </div>
                        <div class="actions">
                            <button class="btn-primary" type="submit">Salvar</button>
                            <button class="btn-ghost" type="button" id="btnCancelar">Voltar</button>
                            <span class="status" id="statusMsg"></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="session.js"></script>
    <script src="enterprise-shell.js"></script>
    <script>
        requireAuthSession();

        const modeLabel = document.getElementById('modeLabel');
        const listCard = document.getElementById('listCard');
        const formCard = document.getElementById('formCard');
        const searchWrap = document.getElementById('searchWrap');
        const btnNovoTipo = document.getElementById('btnNovoTipo');
        const btnCancelar = document.getElementById('btnCancelar');
        const typesBody = document.getElementById('typesBody');
        const rows = Array.from(typesBody.querySelectorAll('tr'));
        const searchInput = document.getElementById('searchInput');
        const statusMsg = document.getElementById('statusMsg');

        function inCadastroMode() {
            return window.location.hash === '#cadastro';
        }

        function renderMode() {
            const cadastro = inCadastroMode();
            modeLabel.textContent = cadastro ? 'Cadastro' : '';
            listCard.style.display = cadastro ? 'none' : 'block';
            searchWrap.style.display = cadastro ? 'none' : 'flex';
            formCard.classList.toggle('is-visible', cadastro);
            btnNovoTipo.style.display = cadastro ? 'none' : 'inline-flex';
            statusMsg.textContent = '';
            statusMsg.classList.remove('error');
        }

        btnNovoTipo.addEventListener('click', () => {
            window.location.hash = 'cadastro';
        });

        btnCancelar.addEventListener('click', () => {
            window.location.hash = '';
        });

        window.addEventListener('hashchange', renderMode);

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim().toLowerCase();
            rows.forEach((row) => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });

        document.getElementById('tipoForm').addEventListener('submit', (event) => {
            event.preventDefault();
            const input = document.getElementById('tipoNome');
            const nome = input.value.trim();
            if (!nome) {
                statusMsg.textContent = 'Informe o nome do tipo.';
                statusMsg.classList.add('error');
                return;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${nome}</td>`;
            typesBody.appendChild(tr);
            rows.push(tr);

            input.value = '';
            statusMsg.textContent = 'Tipo salvo com sucesso!';
            statusMsg.classList.remove('error');
            window.location.hash = '';
        });

        renderMode();
    </script>
</body>
</html>
