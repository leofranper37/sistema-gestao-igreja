name: 🚀 Deploy & Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      deployments: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: 🔐 Pull Vercel Environment Variables
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: 🏗️ Build Project
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: 🚀 Deploy to Production
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    - name: ✅ Deployment Complete
      run: echo "✅ Deploy to https://www.ldfp.com.br complete!"

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
    - name: 🏥 Health Check
      run: |
        echo "Checking site health..."
        for i in {1..5}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.ldfp.com.br/index.html)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Site is up! HTTP $STATUS"
            exit 0
          fi
          echo "⏳ Attempt $i: HTTP $STATUS - retrying..."
          sleep 5
        done
        echo "❌ Site health check failed"
        exit 1
    
    - name: 🔍 Check key endpoints
      run: |
        ENDPOINTS=("/login.html" "/planos.html" "/criar_conta.html")
        for endpoint in "${ENDPOINTS[@]}"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://www.ldfp.com.br$endpoint")
          echo "  $endpoint: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "  ❌ Endpoint $endpoint failed!"
            exit 1
          fi
        done
        echo "✅ All key endpoints are accessible"

  performance-check:
    runs-on: ubuntu-latest
    needs: health-check
    
    steps:
    - name: ⚡ Performance Metrics
      run: |
        echo "Vercel Speed Insights will monitor:"
        echo "- Core Web Vitals (LCP, FID, CLS)"
        echo "- First Contentful Paint (FCP)"
        echo "- Time to First Byte (TTFB)"
        echo ""
        echo "View at: https://vercel.com/dashboard/projects/sistema-gestao-igreja/analytics"

  notify-success:
    if: success()
    runs-on: ubuntu-latest
    needs: [deploy, health-check, performance-check]
    
    steps:
    - name: 📢 Deployment Success
      run: |
        echo "✅ Deployment Successful!"
        echo "🌐 Site: https://www.ldfp.com.br"
        echo "📊 Analytics: https://vercel.com/dashboard"
        echo "⏱️ Deployment Time: $(date)"

  notify-failure:
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
    - name: 📢 Deployment Failed
      run: |
        echo "❌ Deployment Failed!"
        echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
