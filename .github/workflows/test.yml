name: ЁЯзк Tests & Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: ЁЯУж Install dependencies
      run: npm ci
    
    - name: тЬЕ Run linting
      run: npm run lint --if-present || echo "No lint script found"
    
    - name: ЁЯзк Run tests
      run: npm test --if-present || echo "No test script configured"
    
    - name: ЁЯФН Check for syntax errors
      run: node -c src/app.js && node -c api/index.js
    
    - name: ЁЯУЭ Check environment files
      run: |
        echo "Checking .env.example syntax..."
        if [ -f .env.example ]; then
          echo "тЬЕ .env.example exists"
        else
          echo "тЭМ .env.example not found"
          exit 1
        fi
    
    - name: ЁЯПЧя╕П Build check
      run: |
        echo "Production build check..."
        npm run build --if-present || echo "No build script, but that's OK for Node.js"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: ЁЯФР Check for secrets
      run: |
        echo "Scanning for hardcoded secrets..."
        if grep -rP "(password|secret|api[_-]key)\s*=\s*['\"][^$\{'\"][^'\"]{6,}" src/ --include="*.js" 2>/dev/null | grep -v "node_modules" | grep -v "process\.env" | grep -v "//"; then
          echo "тЪая╕П Possible hardcoded secrets found - review before commit"
          exit 1
        fi
        echo "тЬЕ No obvious secrets found"
    
    - name: ЁЯУЭ Check .gitignore compliance
      run: |
        echo "Checking git status..."
        if [ -n "$(git status --porcelain)" ]; then
          echo "ЁЯУЛ Files not committed (may be in .gitignore)"
          git status --porcelain
        fi
        echo "тЬЕ Git compliance check complete"

  deployment-readiness:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: тЬЕ Verify Vercel config
      run: |
        if [ ! -f vercel.json ]; then
          echo "тЭМ vercel.json not found"
          exit 1
        fi
        echo "тЬЕ vercel.json exists"
        cat vercel.json
    
    - name: тЬЕ Verify package.json
      run: |
        if [ ! -f package.json ]; then
          echo "тЭМ package.json not found"
          exit 1
        fi
        echo "тЬЕ package.json exists"
        node -e "console.log(require('./package.json').name)"
    
    - name: ЁЯУб Check key files exist
      run: |
        FILES_TO_CHECK=(
          "src/app.js"
          "src/config/db.js"
          "src/middlewares/auth.js"
          "public/index.html"
          "public/login.html"
        )
        
        for file in "${FILES_TO_CHECK[@]}"; do
          if [ -f "$file" ]; then
            echo "тЬЕ $file exists"
          else
            echo "тЭМ $file missing"
            exit 1
          fi
        done

  notify:
    if: always()
    needs: [test, code-quality, deployment-readiness]
    runs-on: ubuntu-latest
    
    steps:
    - name: ЁЯУК Check test results
      run: |
        echo "ЁЯОп CI/CD Pipeline Summary:"
        echo "- Test: ${{ needs.test.result }}"
        echo "- Code Quality: ${{ needs.code-quality.result }}"
        echo "- Deployment Readiness: ${{ needs.deployment-readiness.result }}"
        
        if [[ "${{ needs.test.result }}" == "failure" ]]; then
          echo "тЭМ Tests failed!"
          exit 1
        fi
        echo "тЬЕ All checks passed!"
